  - text: From Wikipedia, the free encyclopedia
  - note:
    - text: For design of products or environments for access by all users, see
    - link "Universal design":
      - /url: /wiki/Universal_design
    - text: . For design of websites etc. for access by all users, see
    - link "Web accessibility":
      - /url: /wiki/Web_accessibility
    - text: . For measures of spatial accessibility, see
    - link "Accessibility (transport)":
      - /url: /wiki/Accessibility_(transport)
    - text: . For the logical notion, see
    - link "Accessibility relation":
      - /url: /wiki/Accessibility_relation
    - text: . For the process in agenda-setting theory, see
    - link "Agenda-setting theory § Accessibility":
      - /url: /wiki/Agenda-setting_theory#Accessibility
    - text: .
  - note:
    - text: For Wikipedia's accessibility guideline, see
    - link "Wikipedia:Accessibility":
      - /url: /wiki/Wikipedia:Accessibility
    - text: .
  - figure "Elevator buttons with Braille markings":
    - link "Panel on an elevator showing the floor buttons with Braille markings":
      - /url: /wiki/File:MAD_BS_Moon_fixtures_(cropped_2).jpg
      - img "Panel on an elevator showing the floor buttons with Braille markings"
    - text: Elevator buttons with Braille markings
  - figure "The public transport system in Curitiba, Brazil, offers universal access via wheelchair lifts.":
    - link "A woman with a baby carriage uses a platform lift to access a station above street level":
      - /url: /wiki/File:Curitiba_10_2006_05_RIT.jpg
      - img "A woman with a baby carriage uses a platform lift to access a station above street level"
    - text: The
    - link "public transport system in Curitiba":
      - /url: /wiki/Rede_Integrada_de_Transporte
    - text: ", Brazil, offers universal access via"
    - link "wheelchair lifts":
      - /url: /wiki/Wheelchair_lift
    - text: .
  - paragraph:
    - text: Accessibility is the design of products, devices, services, vehicles, or environments to be usable by
    - link "disabled":
      - /url: /wiki/Disabled
    - text: people.
    - superscript:
      - link "[1]":
        - /url: "#cite_note-1"
    - text: The concept of accessible design and practice of accessible developments ensures both "direct access" (i.e. unassisted) and "indirect access" meaning compatibility with a person's
    - link "assistive technology":
      - /url: /wiki/Assistive_technology
    - text: (for example, computer
    - link "screen readers":
      - /url: /wiki/Screen_reader
    - text: ).
    - superscript:
      - link "[2]":
        - /url: "#cite_note-2"
  - paragraph:
    - text: Accessibility can be viewed as the "ability to access" and benefit from some system or entity. The concept focuses on enabling access for people with disabilities, or enabling access through the use of
    - link "assistive technology":
      - /url: /wiki/Assistive_technology
    - text: ; however, research and development in accessibility brings benefits to everyone.
    - superscript:
      - link "[3]":
        - /url: "#cite_note-3"
    - superscript:
      - link "[4]":
        - /url: "#cite_note-4"
    - superscript:
      - link "[5]":
        - /url: "#cite_note-5"
    - superscript:
      - link "[6]":
        - /url: "#cite_note-6"
    - superscript:
      - link "[7]":
        - /url: "#cite_note-7"
    - text: Therefore, an accessible society should eliminate
    - link "digital divide":
      - /url: /wiki/Digital_divide
    - text: or
    - link "knowledge divide":
      - /url: /wiki/Knowledge_divide
    - text: .
  - paragraph:
    - text: Accessibility is not to be confused with
    - link "usability":
      - /url: /wiki/Usability
    - text: ", which is the extent to which a product (such as a device, service, or environment) can be used by specified users to achieve specified goals with effectiveness, efficiency, and satisfaction in a specified context of use."
    - superscript:
      - link "[8]":
        - /url: "#cite_note-8"
  - paragraph:
    - text: Accessibility is also strongly related to
    - link "universal design":
      - /url: /wiki/Universal_design
    - text: ", the process of creating products that are usable by the widest possible range of people, operating within the widest possible range of situations."
    - superscript:
      - link "[9]":
        - /url: "#cite_note-9"
    - text: Universal design typically provides a single general solution that can accommodate people with disabilities as well as the rest of the population. By contrast, accessible design is focused on ensuring that there are no barriers to accessibility for all people, including those with disabilities.
  - heading "Legislation" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=1
  - text: "]"
  - figure "International Symbol of Access denotes area with access for those with disabilities.":
    - link "White line figure of a person seated over the axis of a wheel on blue background":
      - /url: /wiki/File:MUTCD_D9-6.svg
      - img "White line figure of a person seated over the axis of a wheel on blue background"
    - link "International Symbol of Access":
      - /url: /wiki/International_Symbol_of_Access
    - text: denotes area with access for those with disabilities.
  - paragraph:
    - text: The
    - link "disability rights movement":
      - /url: /wiki/Disability_rights_movement
    - text: advocates equal access to social, political, and economic life which includes not only physical access but access to the same tools, services, organizations and facilities as non-disabled people (e.g., museums
    - superscript:
      - link "[10]":
        - /url: "#cite_note-10"
    - superscript:
      - link "[11]":
        - /url: "#cite_note-11"
    - text: ). Article 9 of the United Nations
    - link "Convention on the Rights of Persons with Disabilities":
      - /url: /wiki/Convention_on_the_Rights_of_Persons_with_Disabilities
    - text: commits signatories to provide for full accessibility in their countries.
    - superscript:
      - link "[12]":
        - /url: "#cite_note-12"
  - paragraph:
    - text: While it is often used to describe facilities or amenities to assist people with impaired mobility, through the provision of facilities like
    - link "wheelchair ramps":
      - /url: /wiki/Wheelchair_ramp
    - text: ", the term can include other types of disability. Accessible facilities therefore extend to areas such as"
    - link "Braille":
      - /url: /wiki/Braille
    - text: signage,
    - link "elevators":
      - /url: /wiki/Elevator
    - text: ", audio signals at"
    - link "pedestrian crossings":
      - /url: /wiki/Pedestrian_crossing
    - text: ", walkway contours,"
    - link "website accessibility":
      - /url: /wiki/Website_accessibility
    - text: and
    - link "accessible publishing":
      - /url: /wiki/Accessible_publishing
    - text: .
    - superscript:
      - link "[13]":
        - /url: "#cite_note-13"
  - paragraph:
    - text: In the United States, government mandates including Section 508, WCAG,
    - superscript:
      - link "[14]":
        - /url: "#cite_note-14"
    - text: DDA are all enforcing practices to standardize accessibility testing engineering in product development.
  - paragraph: Accessibility modifications may be required to enable persons with disabilities to gain access to education, employment, transportation, housing, recreation, or even simply to exercise their right to vote.
  - heading "National legislation" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=2
  - text: "]"
  - paragraph: "Various countries have legislation requiring physical accessibility which are (in order of enactment):"
  - list:
    - listitem:
      - text: In the US, under the
      - link "Americans with Disabilities Act of 1990":
        - /url: /wiki/Americans_with_Disabilities_Act_of_1990
      - text: ","
      - superscript:
        - link "[15]":
          - /url: "#cite_note-15"
      - text: new public and private business construction generally must be accessible. Existing private businesses are required to increase the accessibility of their facilities when making any other renovations in proportion to the cost of the other renovations. The
      - link "United States Access Board":
        - /url: /wiki/United_States_Access_Board
      - superscript:
        - link "[16]":
          - /url: "#cite_note-16"
      - text: is "A Federal Agency Committed to Accessible Design for
      - link "People with Disabilities":
        - /url: /wiki/Americans_with_disabilities
      - text: "\". The"
      - link "Job Accommodation Network":
        - /url: /wiki/Job_Accommodation_Network
      - text: discusses accommodations for people with disabilities in the workplace.
      - superscript:
        - link "[17]":
          - /url: "#cite_note-17"
      - text: Many states in the US have their own disability laws.
    - listitem:
      - text: In Australia, the
      - link "Disability Discrimination Act 1992":
        - /url: /wiki/Disability_Discrimination_Act_1992
      - text: has numerous provisions for accessibility.
      - superscript:
        - link "[18]":
          - /url: "#cite_note-18"
    - listitem:
      - text: In South Africa the
      - link "Promotion of Equality and Prevention of Unfair Discrimination Act 2000":
        - /url: /wiki/Promotion_of_Equality_and_Prevention_of_Unfair_Discrimination_Act_2000
      - text: has numerous provisions for accessibility.
      - superscript:
        - link "[19]":
          - /url: "#cite_note-19"
    - listitem:
      - text: In the UK, the
      - link "Equality Act 2010":
        - /url: /wiki/Equality_Act_2010
      - text: has numerous provisions for accessibility.
      - superscript:
        - link "[20]":
          - /url: "#cite_note-20"
    - listitem:
      - text: In Sri Lanka, the Supreme Court, on 27 April 2011 gave a landmark order to boost the inherent right of disabled persons to have unhindered access to public buildings and facilities.
      - superscript:
        - link "[21]":
          - /url: "#cite_note-21"
    - listitem:
      - text: In Norway, the Discrimination and Accessibility Act (
      - link "Norwegian":
        - /url: /wiki/Norwegian_language
      - text: ": Diskriminerings- og tilgjengelighetsloven) defines lack of accessibility as discrimination and obliges public authorities to implement universal design in their areas. The Act refers to issue-specific legislation regarding accessibility in e.g. ICT, the built environment, transport and education."
      - superscript:
        - link "[22]":
          - /url: "#cite_note-22"
    - listitem:
      - text: In Brazil, the law on the inclusion of people with disabilities has numerous provisions for accessibility.
      - superscript:
        - link "[23]":
          - /url: "#cite_note-23"
    - listitem:
      - text: In Canada, relevant federal legislation includes the
      - link "Canadian Human Rights Act":
        - /url: /wiki/Canadian_Human_Rights_Act
      - text: ","
      - link "the Employment Equity Act":
        - /url: /wiki/Employment_equity_(Canada)
      - text: ", the"
      - link "Canadian Labour Code":
        - /url: /wiki/Canadian_Labour_Code
      - text: ", and the Accessible Canada Act (Bill-C81) which made Royal Assent on June 21, 2019."
      - superscript:
        - link "[24]":
          - /url: "#cite_note-24"
  - figure "Ramps and mobi-mats enable wheelchair users to visit a sandy seashore.":
    - link "Beachshore with a mobi-mat leading from the kerb to the seashore":
      - /url: /wiki/File:Beach_accessibility_mobi-mat_and_wheelchair_ramp.jpg
      - img "Beachshore with a mobi-mat leading from the kerb to the seashore"
    - text: Ramps and
    - link "mobi-mats":
      - /url: /wiki/Mobi-mat
    - text: enable wheelchair users to visit a sandy seashore.
  - paragraph:
    - text: Legislation may also be enacted on a state, provincial or local level. In
    - link "Ontario, Canada":
      - /url: /wiki/Ontario,_Canada
    - text: ", the"
    - link "Ontarians with Disabilities Act":
      - /url: /wiki/Ontarians_with_Disabilities_Act
    - text: of 2001 is meant to "improve the identification, removal and prevention of barriers faced by persons with disabilities".
    - superscript:
      - link "[25]":
        - /url: "#cite_note-25"
  - paragraph:
    - text: The
    - link "European Union":
      - /url: /wiki/European_Union
    - text: "(EU), which has signed the United Nations' Convention on the Rights of Persons with Disabilities, also has adopted a European Disability Strategy for 2010–20. The Strategy includes the following goals, among others:"
    - superscript:
      - link "[26]":
        - /url: "#cite_note-26"
  - list:
    - listitem: Devising policies for inclusive, high-quality education;
    - listitem: Ensuring the European Platform Against Poverty includes a special focus on people with disabilities (the forum brings together experts who share best practices and experience);
    - listitem: Working towards the recognition of disability cards throughout the EU to ensure equal treatment when working, living or travelling in the bloc
    - listitem: Establishing accessibility standards for voting locations and campaign materials.
    - listitem: Taking the rights of people with disabilities into account in external development programmes and for EU candidate countries.
  - paragraph:
    - text: A European Accessibility Act was proposed in late 2012.
    - superscript:
      - link "[27]":
        - /url: "#cite_note-27"
    - text: This Act would establish standards within member countries for accessible products, services, and public buildings. The harmonization of accessibility standards within the EU "would facilitate the social integration of persons with disabilities and the elderly and their mobility across member states, thereby also fostering the free movement principle".
    - superscript:
      - link "[28]":
        - /url: "#cite_note-28"
  - paragraph: Enforcement of the European Accessibility Act (EAA) begins in June 2025
  - heading "Assistive technology and adaptive technology" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=3
  - text: "]"
  - figure "The Opportunities Fair and Beyond Art Exhibition was organised in Birmingham, England, to help people with disabilities and their carers find out what services, support and opportunities are available to them.":
    - link "People gathered around a table wearing headphones. The journalist holds the microphone for a physically disabled person to speak":
      - /url: /wiki/File:Birmingham_opportunities_fair.jpg
      - img "People gathered around a table wearing headphones. The journalist holds the microphone for a physically disabled person to speak"
    - text: The Opportunities Fair and Beyond Art Exhibition was organised in
    - link "Birmingham":
      - /url: /wiki/Birmingham
    - text: ", England, to help people with disabilities and their carers find out what services, support and opportunities are available to them."
  - paragraph:
    - link "Assistive technology":
      - /url: /wiki/Assistive_technology
    - text: is the creation of a new device that assists a person in completing a task that would otherwise be impossible. Some examples include new computer software programs like
    - link "screen readers":
      - /url: /wiki/Screen_reader
    - text: ", and inventions such as"
    - link "assistive listening devices":
      - /url: /wiki/Assistive_listening_devices
    - text: ", including"
    - link "hearing aids":
      - /url: /wiki/Hearing_aid
    - text: ", and"
    - link "traffic lights":
      - /url: /wiki/Traffic_light
    - text: with a standard
    - link "color code":
      - /url: /wiki/Color_code
    - text: that enables
    - link "colorblind":
      - /url: /wiki/Colorblind
    - text: individuals to understand the correct signal.
  - paragraph:
    - text: Adaptive technology is the modification, or adaptation, of existing devices, methods, or the creation of new uses for existing devices, to enable a person to complete a task.
    - superscript:
      - link "[29]":
        - /url: "#cite_note-29"
    - text: Examples include the use of remote controls, and the
    - link "autocomplete":
      - /url: /wiki/Autocomplete
    - text: (word completion)
    - superscript:
      - link "[30]":
        - /url: "#cite_note-30"
    - text: feature in computer word processing programs, which both help individuals with mobility impairments to complete tasks. Adaptations to wheelchair tires are another example; widening the tires enables wheelchair users to move over soft surfaces, such as deep snow on ski hills, and sandy beaches.
  - paragraph:
    - text: Assistive technology and adaptive technology have a key role in developing the means for people with disabilities to live more independently, and to more fully participate in mainstream society. Recent research has demonstrated that tablet-based assistive technologies can enable adults with intellectual and motor disabilities to engage in independent leisure activities and video communication, enhancing social participation and autonomy. These programs use commercially available tablets and applications with simplified interfaces to support users in accessing media and making video calls with minimal assistance.
    - superscript:
      - link "[31]":
        - /url: "#cite_note-31"
    - text: In order to have access to assistive or adaptive technology, however, educating the public and even legislating requirements to incorporate this technology have been necessary.
  - paragraph: The UN CRPD, and courts in the United States, Japan, UK, and elsewhere, have decided that when it is needed to assure secret ballot, authorities should provide voters with assistive technology.
  - paragraph: The European Court of Human Rights, on the contrary, in case Toplak v. Slovenia ruled that due to high costs, the abandonment of the assistive equipment in elections did not violate human rights.
  - heading "Employment" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=4
  - text: "]"
  - figure "William P. Milton Jr., deputy director of the Office of Human Resource Management, outlined the \"Four Simple Steps to Hiring Qualified Candidates with Disabilities\" to employees of the U.S. Department of Agriculture during a 2011 National Disability Employment Awareness Month event in Washington, D.C.":
    - link "A man is speaking behind a microphone podium during a conference. Behind him, there is a screen showing a presentation slide reading \"Four Simple Steps to Hiring Qualified Candidates with Disabilities\"":
      - /url: /wiki/File:Usda_hiring_applicants_with_disabilities.jpg
      - img "A man is speaking behind a microphone podium during a conference. Behind him, there is a screen showing a presentation slide reading \"Four Simple Steps to Hiring Qualified Candidates with Disabilities\""
    - text: William P. Milton Jr., deputy director of the Office of Human Resource Management, outlined the "Four Simple Steps to Hiring Qualified Candidates with Disabilities" to employees of the
    - link "U.S. Department of Agriculture":
      - /url: /wiki/United_States_Department_of_Agriculture
    - text: during a 2011
    - link "National Disability Employment Awareness Month":
      - /url: /wiki/National_Disability_Employment_Awareness_Month
    - text: event in
    - link "Washington, D.C.":
      - /url: /wiki/Washington,_D.C.
  - paragraph:
    - text: Accessibility of employment covers a wide range of issues, from skills training, to
    - link "occupational therapy":
      - /url: /wiki/Occupational_therapy
    - text: ","
    - superscript:
      - link "[32]":
        - /url: "#cite_note-32"
    - text: finding employment, and retaining employment.
  - paragraph:
    - text: Employment rates for workers with disabilities are lower than for the general workforce. Workers in Western countries fare relatively well, having access to more services and training as well as legal protections against employment discrimination. Despite this, in the United States the 2012 unemployment rate for workers with disabilities was 12.9%, while it was 7.3% for workers without disabilities.
    - superscript:
      - link "[33]":
        - /url: "#cite_note-33"
    - text: More than half of workers with disabilities (52%) earned less than $25,000 in the previous year, compared with just 38% of workers with no disabilities. This translates into an earnings gap where individuals with disabilities earn about 25 percent less of what workers without disabilities earn. Among occupations with 100,000 or more people, dishwashers had the highest disability rate (14.3%), followed by refuse and recyclable material collectors (12.7%), personal care aides (11.9%), and janitors and building cleaners (11.8%). The rates for refuse and recyclable material collectors, personal care aides, and janitors and building cleaners were not statistically different from one another.
    - superscript:
      - link "[34]":
        - /url: "#cite_note-34"
  - paragraph:
    - text: Surveys of non-Western countries are limited, but the available statistics also indicate fewer jobs being filled by workers with disabilities. In India, a large 1999 survey found that "of the 'top 100 multinational companies' in the country [...] the employment rate of persons with disabilities in the private sector was a mere 0.28%, 0.05% in multinational companies and only 0.58% in the top 100 IT companies in the country".
    - superscript:
      - link "[35]":
        - /url: "#cite_note-dsq-sds-35"
    - text: India, like much of the world, has large sections of the economy that are without strong regulation or social protections, such as the
    - link "informal economy":
      - /url: /wiki/Informal_economy
    - text: .
    - superscript:
      - link "[36]":
        - /url: "#cite_note-36"
    - text: "Other factors have been cited as contributing to the high unemployment rate, such as public service regulations. Although employment for workers with disabilities is higher in the public sector due to hiring programs targeting persons with disabilities, regulations currently restrict types of work available to persons with disabilities: \"Disability-specific employment reservations are limited to the public sector and a large number of the reserved positions continue to be vacant despite nearly two decades of enactment of the PWD Act\"."
    - superscript:
      - link "[35]":
        - /url: "#cite_note-dsq-sds-35"
  - paragraph: Expenses related to adaptive or assistive technology required to participate in the workforce may be tax deductible expenses for individuals with a medical practitioner's prescription in some jurisdictions.
  - heading "Disability management" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=5
  - text: "]"
  - paragraph:
    - text: Disability management (DM) is a specialized area of
    - link "human resources":
      - /url: /wiki/Human_resources
    - text: that supports efforts of employers to better integrate and retain workers with disabilities. Some workplaces have policies in place to provide "reasonable accommodation" for employees with disabilities, but many do not. In some jurisdictions, employers may have legal requirements to end
    - link "discrimination against persons with disabilities":
      - /url: /wiki/Ableism
    - text: .
  - paragraph:
    - text: It has been noted by researchers that where accommodations are in place for employees with disabilities, these frequently apply to individuals with "pre-determined or apparent disabilities as determined by national social protection or Equality Authorities",
    - superscript:
      - link "[37]":
        - /url: "#cite_note-Geisen165-37"
    - text: which include persons with pre-existing conditions who receive an official disability designation. One of the biggest challenges for employers is in developing policies and practises to manage employees who develop disabilities during the course of employment. Even where these exist, they tend to focus on workplace injuries, overlooking job retention challenges faced by employees who acquire a non-occupation injury or illness. Protecting employability is a factor that can help close the unemployment gap for persons with disabilities.
    - superscript:
      - link "[37]":
        - /url: "#cite_note-Geisen165-37"
  - heading "Transportation" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=6
  - text: "]"
  - note:
    - text: For the metric of transport connectivity for planning purposes, see
    - link "Accessibility (transport)":
      - /url: /wiki/Accessibility_(transport)
    - text: .
  - paragraph:
    - text: Providing mobility to people with disabilities includes changes for public facilities like gently sloping paths of travel for people using wheelchairs and difficulty walking up stairs, or audio announcements for the blind (either live or
    - link "automated":
      - /url: /w/index.php?title=Automated_on-train_announcements&action=edit&redlink=1
    - text: ); dedicated services like
    - link "paratransit":
      - /url: /wiki/Paratransit
    - text: ; and adaptations to personal vehicles.
  - heading "Adapted automobiles for persons with disabilities" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=7
  - text: "]"
  - note:
    - text: "See also:"
    - link "Adapted automobile":
      - /url: /wiki/Adapted_automobile
  - figure "A wheelchair accessible taxi with a rear ramp, Tokyo Motor Show 2009":
    - link:
      - /url: /wiki/File:Taxi_wheelchair.jpg
      - img
    - text: A wheelchair accessible
    - link "taxi":
      - /url: /wiki/Taxi
    - text: with a rear ramp,
    - link "Tokyo Motor Show":
      - /url: /wiki/Tokyo_Motor_Show
    - text: "2009"
  - paragraph:
    - text: Automobile accessibility also refers to ease of use by disabled people. Automobiles, whether a car or a van, can be adapted for a range of physical disabilities. Foot pedals can be raised, or replaced with hand-controlled devices. Wheelchair hoists, lifts or ramps may be customized according to the needs of the driver.
    - link "Ergonomic":
      - /url: /wiki/Ergonomic
    - text: adaptations, such as a lumbar support cushion, may also be needed.
    - superscript:
      - link "[38]":
        - /url: "#cite_note-38"
  - paragraph:
    - text: Generally, the more limiting the disability, the more expensive the adaptation needed for the vehicle. Financial assistance is available through some organizations, such as
    - link "Motability":
      - /url: /wiki/Motability
    - text: in the United Kingdom, which requires a contribution by the prospective vehicle owner. Motability makes vehicles available for purchase or lease.
    - superscript:
      - link "[39]":
        - /url: "#cite_note-39"
  - paragraph:
    - text: When an employee with a disability requires an adapted car for work use, the employee does not have to pay for a "
    - link "reasonable adjustment":
      - /url: /wiki/Reasonable_accommodation
    - text: "\" in the United Kingdom; if the employer is unable to pay the cost, assistance is offered by government programs."
    - superscript:
      - link "[40]":
        - /url: "#cite_note-40"
  - heading "Low floor" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=8
  - text: "]"
  - note:
    - text: "\"Low floor\" redirects here. For more details, see"
    - link "Low-floor bus":
      - /url: /wiki/Low-floor_bus
    - text: and
    - link "Low-floor tram":
      - /url: /wiki/Low-floor_tram
    - text: .
  - figure "Wheelchair ramps allows those on wheelchairs or personal mobility devices to board low-floor public transport vehicles.":
    - link "A man on a motorized wheelchair is using a ramp to enter an SMRT bus":
      - /url: /wiki/File:Person_on_PMD_boarding_an_SMRT_bus,_August_2022.jpg
      - img "A man on a motorized wheelchair is using a ramp to enter an SMRT bus"
    - text: Wheelchair ramps allows those on wheelchairs or
    - link "personal mobility devices":
      - /url: /wiki/Personal_transporter
    - text: to board low-floor public transport vehicles.
  - paragraph:
    - text: A significant development in transportation, and
    - link "public transport":
      - /url: /wiki/Public_transport
    - text: in particular, to achieve accessibility, is the move to "low-floor" vehicles. In a low-floor vehicle, access to part or all of the passenger cabin is unobstructed from one or more entrances by the presence of steps, enabling easier access for the infirm or people with
    - link "push chairs":
      - /url: /wiki/Baby_transport
    - text: . A further aspect may be that the entrance and corridors are wide enough to accommodate a wheelchair. Low-floor vehicles have been developed for
    - link "buses":
      - /url: /wiki/Bus
    - text: ","
    - link "trolleybuses":
      - /url: /wiki/Trolleybus
    - text: ","
    - link "trams":
      - /url: /wiki/Trams
    - text: and
    - link "trains":
      - /url: /wiki/Train
    - text: .
  - paragraph:
    - text: A low floor in the vehicular sense is normally combined in a conceptual meaning with normal pedestrian access from a standard
    - link "kerb (curb)":
      - /url: /wiki/Curb
    - text: height. However, the accessibility of a low-floor vehicle can also be utilised from slightly raising portions of kerb at
    - link "bus stops":
      - /url: /wiki/Bus_stop
    - text: ", or through use of level boarding"
    - link "bus rapid transit":
      - /url: /wiki/Bus_rapid_transit
    - text: stations or tram stops.
    - superscript:
      - link "[41]":
        - /url: "#cite_note-41"
    - text: The combination of access from a kerb was the technological development of the 1990s, as step-free interior layouts for buses had existed in some cases for decades, with entrance steps being introduced as chassis designs and overall height regulations changed.
  - paragraph:
    - text: Low-floor buses may also be designed with special height adjustment controls that permit a stationary bus to temporarily lower itself to ground level, permitting wheelchair access. This is referred to as a
    - link "kneeling bus":
      - /url: /wiki/Kneeling_bus
    - text: .
  - paragraph:
    - text: At
    - link "rapid transit":
      - /url: /wiki/Rapid_transit
    - text: systems, vehicles generally have floors in the same height as the platforms but the stations are often underground or elevated, so accessibility there is not a question of providing low-floor vehicles, but providing a step-free access from street level to the platforms (generally by
    - link "elevators":
      - /url: /wiki/Elevator
    - text: ", which may be restricted to disabled passengers only, so that the step-free access is not obstructed by non-disabled people taking advantage)."
    - superscript:
      - text: "["
      - link "citation needed":
        - /url: /wiki/Wikipedia:Citation_needed
      - text: "]"
  - heading "Accessibility planning for transportation in the United Kingdom" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=9
  - text: "]"
  - figure "Harrington Hump, Harrington station":
    - link:
      - /url: /wiki/File:Harrington_railway_station,_Cumbria_(geograph_3564245).jpg
      - img
    - link "Harrington Hump":
      - /url: /wiki/Harrington_Hump
    - text: ","
    - link "Harrington station":
      - /url: /wiki/Harrington_station
  - paragraph:
    - text: In the
    - link "United Kingdom":
      - /url: /wiki/United_Kingdom
    - text: ", local transport authorities are responsible for checking that all people who live within their area can access essential opportunities and services, and where gaps in provision are identified the local authorities are responsible for organizing changes to make new connections. These requirements are defined in the UK Community Planning Acts legislation"
    - superscript:
      - link "[42]":
        - /url: "#cite_note-42"
    - text: and more detailed guidance has been issued by the
    - link "Department for Transport":
      - /url: /wiki/Department_for_Transport
    - text: for each
    - link "local authority":
      - /url: /wiki/Local_authority#England
    - text: . This includes the requirement to produce an Accessibility Plan under Community Planning legislation and to incorporate this within their
    - link "Local Transport Plan":
      - /url: /wiki/Local_Transport_Plan
    - text: .
    - superscript:
      - link "[43]":
        - /url: "#cite_note-43"
    - text: An Accessibility Plan sets out how each local authority plans to improve access to employment, learning, health care, food shops and other services of local importance, particularly for disadvantaged groups and areas. Accessibility targets are defined in the accessibility plans, these are often the distance or time to access services by different modes of transport including walking, cycling and public transport.
  - paragraph:
    - text: "Accessibility Planning was introduced as a result of the report \"Making the Connections: Final Report on Transport and Social Exclusion\"."
    - superscript:
      - link "[44]":
        - /url: "#cite_note-44"
    - text: This report was the result of research carried out by the
    - link "Social Exclusion":
      - /url: /wiki/Social_exclusion
    - text: "Unit. The United Kingdom also has a \"code of practice\" for making train and stations accessible: \"Accessible Train and Station Design for Disabled People: A Code of Practice\"."
    - superscript:
      - link "[45]":
        - /url: "#cite_note-45"
    - text: This code of practice was first published in 2002 with the objective of compliance to Section 71B of the Railways Act 1993,
    - superscript:
      - link "[46]":
        - /url: "#cite_note-46"
    - text: and revised after a public consultation period in 2008.
  - paragraph:
    - text: Some transport companies have since improved the accessibility of their services, such as incorporating
    - link "low-floor buses":
      - /url: /wiki/Low-floor_bus
    - text: into their stock as standard.
    - superscript:
      - link "[47]":
        - /url: "#cite_note-47"
    - text: In August 2021,
    - link "South Western Railway":
      - /url: /wiki/South_Western_Railway_(train_operating_company)
    - text: announced the streamlining of their accessibility services, allowing passengers requiring assistance to inform the company with as little as 10 minutes' notice at all 189 stations on its network, replacing an older scheme wherein assisted journeys had to be booked six hours to a day in advance. The system will utilise clear signage at stations and
    - link "QR codes":
      - /url: /wiki/QR_code
    - text: ", allowing customers to send details of the assistance they require and their planned journey to staff remotely."
    - superscript:
      - link "[48]":
        - /url: "#cite_note-48"
  - paragraph:
    - text: Making public services fully accessible to the public has led to some technological innovations.
    - link "Public announcement":
      - /url: /wiki/Public_announcement
    - text: systems using
    - link "audio induction loop":
      - /url: /wiki/Audio_induction_loop
    - text: technology can broadcast announcements directly into the hearing aid of anyone with a hearing impairment, making them useful in such public places as auditoriums and train stations.
  - heading "Public space" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=10
  - text: "]"
  - paragraph:
    - text: The
    - link "UN Convention on the Rights of Persons with Disabilities":
      - /url: /wiki/Convention_on_the_Rights_of_Persons_with_Disabilities
    - text: (2006) requires 'appropriate measures' to ensure people with disabilities are able to 'access, on an equal basis with others','the physical environment', 'transportation' and 'other facilities and services open or provided to the public'. This requirement also applies to 'roads' and 'transportation' as well as 'buildings, and other indoor and outdoor facilities'.
    - superscript:
      - link "[49]":
        - /url: "#cite_note-49"
  - paragraph:
    - text: At the same time, promotion of
    - link "active travel":
      - /url: /wiki/Active_mobility
    - text: ", or 'shared space' initiatives to pedestrianise city centres can introduce unintended barriers, especially for pedestrians who are visually impaired and who can find these environments confusing or even dangerous."
    - superscript:
      - link "[50]":
        - /url: "#cite_note-:0-50"
    - text: It is important to have effective mechanisms to ensure that urban spaces are designed to be inclusive of pedestrians with disabilities. These can include early consultation with disabled persons or their representative organisations, and appropriate regulation of city planning.
    - superscript:
      - link "[50]":
        - /url: "#cite_note-:0-50"
  - heading "Housing" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=11
  - text: "]"
  - note:
    - text: "Further information:"
    - link "Accessible housing":
      - /url: /wiki/Accessible_housing
  - figure "Accessibly designed modification for a high-step entrance":
    - link "An entrance with ramps and guardrails":
      - /url: /wiki/File:-118wiki.jpg
      - img "An entrance with ramps and guardrails"
    - text: Accessibly designed modification for a high-step entrance
  - paragraph:
    - text: Most existing and new housing, even in the wealthiest nations, lack basic accessibility features unless the designated, immediate occupant of a home currently has a disability. However, there are some initiatives to change typical residential practices so that new homes incorporate basic access features such as zero-step entries and door widths adequate for wheelchairs to pass through.
    - link "Occupational Therapists":
      - /url: /wiki/Occupational_Therapist
    - text: are a professional group skilled in the assessment and making of recommendations to improve access to homes.
    - superscript:
      - link "[51]":
        - /url: "#cite_note-51"
    - text: They are involved in both the adaptation of existing housing to improve accessibility,
    - superscript:
      - link "[52]":
        - /url: "#cite_note-52"
    - text: and in the design of future housing.
    - superscript:
      - link "[53]":
        - /url: "#cite_note-53"
  - paragraph:
    - text: The broad concept of
    - link "Universal design":
      - /url: /wiki/Universal_design
    - text: is relevant to housing, as it is to all aspects of the built environment. Furthermore, a
    - link "Visitability":
      - /url: /wiki/Visitability
    - text: movement
    - superscript:
      - link "[54]":
        - /url: "#cite_note-54"
    - text: begun by grass roots disability advocates in the 1980s focuses specifically on changing construction practices in new housing. This movement, a network of interested people working in their locales, works on educating, passing laws, and spurring voluntary home access initiatives with the intention that basic access become a routine part of new home construction.
  - heading "Accessibility and \"ageing in place\"" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=12
  - text: "]"
  - paragraph:
    - text: Accessibility in the design of housing and household devices has become more prominent in recent decades due to a rapidly ageing population in developed countries.
    - superscript:
      - link "[55]":
        - /url: "#cite_note-55"
    - text: Ageing seniors may wish to continue living independently, but the ageing process naturally increases the disabilities that a senior citizen will experience. A growing trend is the desire for many senior citizens to 'age in place', living as independently as possible for as long as possible. Accessibility modifications that allow ageing in place are becoming more common. Housing may even be designed to incorporate accessibility modifications that can be made throughout the life cycle of the residents.
  - paragraph:
    - text: The English Housing Survey for 2018/19 found only 9% of homes in England have key features, such as a toilet at entrance level and sufficiently wide doorways, to deem them accessible. This was an improvement from 5% in 2005. More than 400,000 wheelchair users in England were living in homes which are neither adapted nor accessible.
    - superscript:
      - link "[56]":
        - /url: "#cite_note-56"
  - heading "Voting" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=13
  - text: "]"
  - paragraph:
    - text: Under the
    - link "Convention on the Rights of Persons with Disabilities":
      - /url: /wiki/Convention_on_the_Rights_of_Persons_with_Disabilities
    - text: ", states parties are bound to assure accessible"
    - link "elections":
      - /url: /wiki/Election
    - text: ","
    - link "voting":
      - /url: /wiki/Voting
    - text: ", and voting procedures. In 2018, the United Nations"
    - link "Committee on the Rights of Persons with Disabilities":
      - /url: /wiki/Committee_on_the_Rights_of_Persons_with_Disabilities
    - text: issued an opinion that all polling stations should be fully accessible. At the
    - link "European Court of Human Rights":
      - /url: /wiki/European_Court_of_Human_Rights
    - text: ", there are currently two ongoing cases about the accessibility of polling places and voting procedures. They were brought against"
    - link "Slovenia":
      - /url: /wiki/Slovenia
    - text: by two voters and the
    - link "Slovenian Disability Rights Association":
      - /url: /wiki/Slovenian_Disability_Rights_Association
    - text: .
    - superscript:
      - link "[57]":
        - /url: "#cite_note-57"
    - text: As of January 2020, the case, called
    - link "Toplak and Mrak v. Slovenia":
      - /url: /wiki/Toplak_and_Mrak_v._Slovenia
    - text: ", was ongoing."
    - superscript:
      - link "[58]":
        - /url: "#cite_note-58"
    - text: The aim of the court procedure is to make accessible all polling places in Europe.
    - superscript:
      - link "[59]":
        - /url: "#cite_note-59"
  - heading "Disability, information technology (IT) and telecommunications" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=14
  - text: "]"
  - note:
    - text: "Main article:"
    - link "Design for All (in ICT)":
      - /url: /wiki/Design_for_All_(in_ICT)
  - note:
    - text: "See also:"
    - link "Data access":
      - /url: /wiki/Data_access
    - text: and
    - link "Assistive technology":
      - /url: /wiki/Assistive_technology
  - text: This section's
  - link "factual accuracy":
    - /url: /wiki/Wikipedia:Accuracy_dispute
  - text: may be compromised due to out-of-date information. Please help update this article to reflect recent events or newly available information. (November 2012)
  - paragraph:
    - text: Advances in information technology and telecommunications have represented a leap forward for accessibility. Access to the technology is restricted to those who can afford it, but it has become more widespread in Western countries in recent years. For those who use it, it provides the ability to access information and services by minimizing the barriers of distance and cost as well as the accessibility and usability of the interface. In many countries this has led to initiatives, laws and/or regulations that aim toward providing universal access to the internet and to phone systems at reasonable cost to citizens.
    - superscript:
      - link "[60]":
        - /url: "#cite_note-60"
  - paragraph:
    - text: A major advantage of advanced technology is its flexibility. Some technologies can be used at home, in the workplace, and in school, expanding the ability of the user to participate in various spheres of daily life.
    - link "Augmentative and alternative communication":
      - /url: /wiki/Augmentative_and_alternative_communication
    - text: technology is one such area of IT progress. It includes inventions such as
    - link "speech-generating devices":
      - /url: /wiki/Speech-generating_device
    - text: ","
    - link "teletypewriter":
      - /url: /wiki/Teletypewriter
    - text: devices, adaptive pointing devices to replace computer mouse devices, and many others. Mobile telecommunications devices and computer applications are also equipped with accessibility features.
    - superscript:
      - link "[61]":
        - /url: "#cite_note-61"
    - superscript:
      - link "[62]":
        - /url: "#cite_note-62"
    - superscript:
      - link "[63]":
        - /url: "#cite_note-63"
    - text: They can be adapted to create accessibility to a range of tasks, and may be suitable for different kinds of disability.
  - paragraph: "The following impairments are some of the disabilities that affect communications and technology access, as well as many other life activities:"
  - list:
    - listitem:
      - link "Communication disorders":
        - /url: /wiki/Communication_disorder
      - text: ;
      - superscript:
        - link "[64]":
          - /url: "#cite_note-64"
    - listitem:
      - link "Hearing impairments":
        - /url: /wiki/Hearing_impairment
      - text: ;
      - superscript:
        - link "[65]":
          - /url: "#cite_note-65"
    - listitem:
      - link "Visual impairments":
        - /url: /wiki/Visual_impairment
      - text: ;
      - superscript:
        - link "[66]":
          - /url: "#cite_note-66"
    - listitem:
      - link "Mobility impairments":
        - /url: /wiki/Mobility_impairment
      - text: ;
    - listitem:
      - text: A
      - link "learning disability":
        - /url: /wiki/Learning_disability
      - text: or impairment in mental functioning.
  - paragraph: Each kind of disability requires a different kind of accommodation, and this may require analysis by a medical specialist, an educational specialist or a job analysis when the impairment requires accommodation.
  - list:
    - listitem:
      - link "Job analysis":
        - /url: /wiki/Job_analysis
      - superscript:
        - link "[67]":
          - /url: "#cite_note-67"
  - heading "Examples of common assistive technologies" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=15
  - text: "]"
  - table:
    - rowgroup:
      - row "Impairment Assistive technology":
        - columnheader "Impairment"
        - columnheader "Assistive technology"
