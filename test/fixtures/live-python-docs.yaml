  - term:
    - emphasis: async
    - text: asyncio.to_thread(
    - emphasis: func
    - text: ","
    - emphasis: /
    - text: ","
    - emphasis: "*args"
    - text: ","
    - emphasis: "**kwargs"
    - text: )
  - definition:
    - paragraph:
      - text: Asynchronously run function
      - emphasis: func
      - text: in a separate thread.
    - paragraph:
      - text: Any *args and **kwargs supplied for this function are directly passed to
      - emphasis: func
      - text: . Also, the current
      - link "contextvars.Context":
        - /url: contextvars.html#contextvars.Context
        - code: contextvars.Context
      - text: is propagated, allowing context variables from the event loop thread to be accessed in the separate thread.
    - paragraph:
      - text: Return a coroutine that can be awaited to get the eventual result of
      - emphasis: func
      - text: .
    - paragraph: "This coroutine function is primarily intended to be used for executing IO-bound functions/methods that would otherwise block the event loop if they were run in the main thread. For example:"
    - text: "def blocking_io(): print(f\"start blocking_io at {time.strftime('%X')}\") # Note that time.sleep() can be replaced with any blocking # IO-bound operation, such as file operations. time.sleep(1) print(f\"blocking_io complete at {time.strftime('%X')}\") async def main(): print(f\"started main at {time.strftime('%X')}\") await asyncio.gather( asyncio.to_thread(blocking_io), asyncio.sleep(1)) print(f\"finished main at {time.strftime('%X')}\") asyncio.run(main()) # Expected output: # # started main at 19:50:53 # start blocking_io at 19:50:53 # blocking_io complete at 19:50:54 # finished main at 19:50:54"
    - paragraph:
      - text: Directly calling
      - code: blocking_io()
      - text: in any coroutine would block the event loop for its duration, resulting in an additional 1 second of run time. Instead, by using
      - code: asyncio.to_thread()
      - text: ", we can run it in a separate thread without blocking the event loop."
    - paragraph: "Note:"
    - paragraph:
      - text: Due to the
      - link "GIL":
        - /url: ../glossary.html#term-GIL
      - text: ","
      - code: asyncio.to_thread()
      - text: can typically only be used to make IO-bound functions non-blocking. However, for extension modules that release the GIL or alternative Python implementations that don’t have one,
      - code: asyncio.to_thread()
      - text: can also be used for CPU-bound functions.
    - paragraph: Added in version 3.9.
  - heading "Scheduling From Other Threads" [level=2]:
    - link "Scheduling From Other Threads":
      - /url: "#id14"
  - term:
    - text: asyncio.run_coroutine_threadsafe(
    - emphasis: coro
    - text: ","
    - emphasis: loop
    - text: )
  - definition:
    - paragraph: Submit a coroutine to the given event loop. Thread-safe.
    - paragraph:
      - text: Return a
      - link "concurrent.futures.Future":
        - /url: concurrent.futures.html#concurrent.futures.Future
        - code: concurrent.futures.Future
      - text: to wait for the result from another OS thread.
    - paragraph: "This function is meant to be called from a different OS thread than the one where the event loop is running. Example:"
    - text: "def in_thread(loop: asyncio.AbstractEventLoop) -> None: # Run some blocking IO pathlib.Path(\"example.txt\").write_text(\"hello world\", encoding=\"utf8\") # Create a coroutine coro = asyncio.sleep(1, result=3) # Submit the coroutine to a given loop future = asyncio.run_coroutine_threadsafe(coro, loop) # Wait for the result with an optional timeout argument assert future.result(timeout=2) == 3 async def amain() -> None: # Get the running loop loop = asyncio.get_running_loop() # Run something in a thread await asyncio.to_thread(in_thread, loop)"
    - paragraph: "It’s also possible to run the other way around. Example:"
    - text: "@contextlib.contextmanager def loop_in_thread() -> Generator[asyncio.AbstractEventLoop]: loop_fut = concurrent.futures.Future[asyncio.AbstractEventLoop]() stop_event = asyncio.Event() async def main() -> None: loop_fut.set_result(asyncio.get_running_loop()) await stop_event.wait() with concurrent.futures.ThreadPoolExecutor(1) as tpe: complete_fut = tpe.submit(asyncio.run, main()) for fut in concurrent.futures.as_completed((loop_fut, complete_fut)): if fut is loop_fut: loop = loop_fut.result() try: yield loop finally: loop.call_soon_threadsafe(stop_event.set) else: fut.result() # Create a loop in another thread with loop_in_thread() as loop: # Create a coroutine coro = asyncio.sleep(1, result=3) # Submit the coroutine to a given loop future = asyncio.run_coroutine_threadsafe(coro, loop) # Wait for the result with an optional timeout argument assert future.result(timeout=2) == 3"
    - paragraph: "If an exception is raised in the coroutine, the returned Future will be notified. It can also be used to cancel the task in the event loop:"
    - text: "try: result = future.result(timeout) except TimeoutError: print('The coroutine took too long, cancelling the task...') future.cancel() except Exception as exc: print(f'The coroutine raised an exception: {exc!r}') else: print(f'The coroutine returned: {result!r}')"
    - paragraph:
      - text: See the
      - link "concurrency and multithreading":
        - /url: asyncio-dev.html#asyncio-multithreading
      - text: section of the documentation.
    - paragraph:
      - text: Unlike other asyncio functions this function requires the
      - emphasis: loop
      - text: argument to be passed explicitly.
    - paragraph: Added in version 3.5.1.
