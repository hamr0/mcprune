    - paragraph:
      - text: The object returned by
      - code: as_completed()
      - text: can be iterated as an
      - link "asynchronous iterator":
        - /url: ../glossary.html#term-asynchronous-iterator
      - text: or a plain
      - link "iterator":
        - /url: ../glossary.html#term-iterator
      - text: ". When asynchronous iteration is used, the originally-supplied awaitables are yielded if they are tasks or futures. This makes it easy to correlate previously-scheduled tasks with their results. Example:"
    - text: "ipv4_connect = create_task(open_connection(\"127.0.0.1\", 80)) ipv6_connect = create_task(open_connection(\"::1\", 80)) tasks = [ipv4_connect, ipv6_connect] async for earliest_connect in as_completed(tasks): # earliest_connect is done. The result can be obtained by # awaiting it or calling earliest_connect.result() reader, writer = await earliest_connect if earliest_connect is ipv6_connect: print(\"IPv6 connection established.\") else: print(\"IPv4 connection established.\")"
    - paragraph: During asynchronous iteration, implicitly-created tasks will be yielded for supplied awaitables that aren’t tasks or futures.
    - paragraph: "When used as a plain iterator, each iteration yields a new coroutine that returns the result or raises the exception of the next completed awaitable. This pattern is compatible with Python versions older than 3.13:"
    - text: "ipv4_connect = create_task(open_connection(\"127.0.0.1\", 80)) ipv6_connect = create_task(open_connection(\"::1\", 80)) tasks = [ipv4_connect, ipv6_connect] for next_connect in as_completed(tasks): # next_connect is not one of the original task objects. It must be # awaited to obtain the result value or raise the exception of the # awaitable that finishes next. reader, writer = await next_connect"
    - paragraph:
      - text: A
      - link "TimeoutError":
        - /url: exceptions.html#TimeoutError
        - code: TimeoutError
      - text: is raised if the timeout occurs before all awaitables are done. This is raised by the
      - code: async for
      - text: loop during asynchronous iteration or by the coroutines yielded during plain iteration.
    - paragraph:
      - text: "Changed in version 3.10: Removed the"
      - emphasis: loop
      - text: parameter.
    - paragraph:
      - text: "Deprecated since version 3.10: Deprecation warning is emitted if not all awaitable objects in the"
      - emphasis: aws
      - text: iterable are Future-like objects and there is no running event loop.
    - paragraph: "Changed in version 3.12: Added support for generators yielding tasks."
    - paragraph:
      - text: "Changed in version 3.13: The result can now be used as either an"
      - link "asynchronous iterator":
        - /url: ../glossary.html#term-asynchronous-iterator
      - text: or as a plain
      - link "iterator":
        - /url: ../glossary.html#term-iterator
      - text: (previously it was only a plain iterator).
  - heading "Running in Threads" [level=2]:
