  - region "Mapping an array of numbers to an array of square roots":
    - heading "Mapping an array of numbers to an array of square roots" [level=3]:
      - link "Mapping an array of numbers to an array of square roots":
        - /url: "#mapping_an_array_of_numbers_to_an_array_of_square_roots"
    - paragraph: The following code takes an array of numbers and creates a new array containing the square roots of the numbers in the first array.
    - text: js
    - button "Copy"
    - code: const numbers = [1, 4, 9]; const roots = numbers.map((num) => Math.sqrt(num)); // roots is now [1, 2, 3] // numbers is still [1, 4, 9]
  - region "Using map to reformat objects in an array":
    - heading "Using map to reformat objects in an array" [level=3]:
      - link "Using map to reformat objects in an array":
        - /url: "#using_map_to_reformat_objects_in_an_array"
    - paragraph: The following code takes an array of objects and creates a new array containing the newly reformatted objects.
    - text: js
    - button "Copy"
    - code: "const kvArray = [ { key: 1, value: 10 }, { key: 2, value: 20 }, { key: 3, value: 30 }, ]; const reformattedArray = kvArray.map(({ key, value }) => ({ [key]: value })); console.log(reformattedArray); // [{ 1: 10 }, { 2: 20 }, { 3: 30 }] console.log(kvArray); // [ // { key: 1, value: 10 }, // { key: 2, value: 20 }, // { key: 3, value: 30 } // ]"
  - region "Using parseInt() with map()":
    - heading "Using parseInt() with map()" [level=3]:
      - link "Using parseInt() with map()":
        - /url: "#using_parseint_with_map"
    - paragraph: "It is common to use the callback with one argument (the element being traversed). Certain functions are also commonly used with one argument, even though they take additional optional arguments. These habits may lead to confusing behaviors. Consider:"
    - text: js
    - button "Copy"
    - code: "[\"1\", \"2\", \"3\"].map(parseInt);"
    - paragraph:
      - text: While one might expect
      - code: "[1, 2, 3]"
      - text: ", the actual result is"
      - code: "[1, NaN, NaN]"
      - text: .
    - paragraph:
      - link "parseInt":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/parseInt
        - code: parseInt
      - text: is often used with one argument, but takes two. The first is an expression and the second is the radix to the callback function,
      - code: Array.prototype.map
      - text: "passes 3 arguments: the element, the index, and the array. The third argument is ignored by"
      - link "parseInt":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/parseInt
        - code: parseInt
      - text: — but
      - emphasis: not
      - text: the second one! This is the source of possible confusion.
    - paragraph: "Here is a concise example of the iteration steps:"
    - text: js
    - button "Copy"
    - code: "/* first iteration (index is 0): */ parseInt(\"1\", 0); // 1 /* second iteration (index is 1): */ parseInt(\"2\", 1); // NaN /* third iteration (index is 2): */ parseInt(\"3\", 2); // NaN"
    - paragraph: "To solve this, define another function that only takes one argument:"
    - text: js
    - button "Copy"
    - code: "[\"1\", \"2\", \"3\"].map((str) => parseInt(str, 10)); // [1, 2, 3]"
    - paragraph:
      - text: You can also use the
      - link "Number":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Number
        - code: Number
      - text: "function, which only takes one argument:"
    - text: js
    - button "Copy"
    - code: "[\"1\", \"2\", \"3\"].map(Number); // [1, 2, 3] // But unlike parseInt(), Number() will also return a float or (resolved) exponential notation: [\"1.1\", \"2.2e2\", \"3e300\"].map(Number); // [1.1, 220, 3e+300] // For comparison, if we use parseInt() on the array above: [\"1.1\", \"2.2e2\", \"3e300\"].map((str) => parseInt(str, 10)); // [1, 2, 3]"
    - paragraph:
      - text: See
      - link "A JavaScript optional argument hazard (external)":
        - /url: https://wirfs-brock.com/allen/posts/166
      - text: by Allen Wirfs-Brock for more discussions.
  - region "Mapped array contains undefined":
    - heading "Mapped array contains undefined" [level=3]:
      - link "Mapped array contains undefined":
        - /url: "#mapped_array_contains_undefined"
    - paragraph:
      - text: When
      - link "undefined":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/undefined
        - code: undefined
      - text: or nothing is returned, the resulting array contains
      - code: undefined
      - text: . If you want to delete the element instead, chain a
      - link "filter()":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array/filter
        - code: filter()
      - text: method, or use the
      - link "flatMap()":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array/flatMap
        - code: flatMap()
      - text: method and return an empty array to signify deletion.
    - text: js
    - button "Copy"
    - code: "const numbers = [1, 2, 3, 4]; const filteredNumbers = numbers.map((num, index) => { if (index < 3) { return num; } }); // index goes from 0, so the filterNumbers are 1,2,3 and undefined. // filteredNumbers is [1, 2, 3, undefined] // numbers is still [1, 2, 3, 4]"
  - region "Side-effectful mapping":
    - heading "Side-effectful mapping" [level=3]:
      - link "Side-effectful mapping":
        - /url: "#side-effectful_mapping"
    - paragraph: The callback can have side effects.
    - text: js
    - button "Copy"
    - code: "const cart = [5, 15, 25]; let total = 0; const withTax = cart.map((cost) => { total += cost; return cost * 1.2; }); console.log(withTax); // [6, 18, 30] console.log(total); // 45"
    - paragraph: This is not recommended, because copying methods are best used with pure functions. In this case, we can choose to iterate the array twice.
    - text: js
    - button "Copy"
    - code: const cart = [5, 15, 25]; const total = cart.reduce((acc, cost) => acc + cost, 0); const withTax = cart.map((cost) => cost * 1.2);
    - paragraph:
      - text: Sometimes this pattern goes to its extreme and the
      - emphasis: only
      - text: useful thing that
      - code: map()
      - text: does is causing side effects.
    - text: js
    - button "Copy"
    - code: "const products = [ { name: \"sports car\" }, { name: \"laptop\" }, { name: \"phone\" }, ]; products.map((product) => { product.price = 100; });"
    - paragraph:
      - text: As mentioned previously, this is an anti-pattern. If you don't use the return value of
      - code: map()
      - text: ", use"
      - code: forEach()
      - text: or a
      - code: for...of
      - text: loop instead.
    - text: js
    - button "Copy"
    - code: "products.forEach((product) => { product.price = 100; });"
    - paragraph: "Or, if you want to create a new array instead:"
    - text: js
    - button "Copy"
    - code: "const productsWithPrice = products.map((product) => ({ ...product, price: 100, }));"
  - region "Using the third argument of callbackFn":
    - heading "Using the third argument of callbackFn" [level=3]:
      - link "Using the third argument of callbackFn":
        - /url: "#using_the_third_argument_of_callbackfn"
    - paragraph:
      - text: The
      - code: array
      - text: argument is useful if you want to access another element in the array, especially when you don't have an existing variable that refers to the array. The following example first uses
      - code: filter()
      - text: to extract the positive values and then uses
      - code: map()
      - text: to create a new array where each element is the average of its neighbors and itself.
    - text: js
    - button "Copy"
    - code: "const numbers = [3, -1, 1, 4, 1, 5, 9, 2, 6]; const averaged = numbers .filter((num) => num > 0) .map((num, idx, arr) => { // Without the arr argument, there's no way to easily access the // intermediate array without saving it to a variable. const prev = arr[idx - 1]; const next = arr[idx + 1]; let count = 1; let total = num; if (prev !== undefined) { count++; total += prev; } if (next !== undefined) { count++; total += next; } const average = total / count; // Keep two decimal places return Math.round(average * 100) / 100; }); console.log(averaged); // [2, 2.67, 2, 3.33, 5, 5.33, 5.67, 4]"
    - paragraph:
      - text: The
      - code: array
      - text: argument is
      - emphasis: not
      - text: the array that is being built — there is no way to access the array being built from the callback function.
  - region "Using map() on sparse arrays":
    - heading "Using map() on sparse arrays" [level=3]:
      - link "Using map() on sparse arrays":
        - /url: "#using_map_on_sparse_arrays"
    - paragraph:
      - text: A sparse array remains sparse after
      - code: map()
      - text: . The indices of empty slots are still empty in the returned array, and the callback function won't be called on them.
    - text: js
    - button "Copy"
    - code: "console.log( [1, , 3].map((x, index) => { console.log(`Visit ${index}`); return x * 2; }), ); // Visit 0 // Visit 2 // [2, empty, 6]"
  - region "Calling map() on non-array objects":
    - heading "Calling map() on non-array objects" [level=3]:
      - link "Calling map() on non-array objects":
        - /url: "#calling_map_on_non-array_objects"
    - paragraph:
      - text: The
      - code: map()
      - text: method reads the
      - code: length
      - text: property of
      - code: this
      - text: and then accesses each property whose key is a nonnegative integer less than
      - code: length
      - text: .
    - text: js
    - button "Copy"
    - code: "const arrayLike = { length: 3, 0: 2, 1: 3, 2: 4, 3: 5, // ignored by map() since length is 3 }; console.log(Array.prototype.map.call(arrayLike, (x) => x ** 2)); // [ 4, 9, 16 ]"
    - paragraph:
      - text: This example shows how to iterate through a collection of objects collected by
      - code: querySelectorAll
      - text: . This is because
      - code: querySelectorAll
      - text: returns a
      - code: NodeList
      - text: (which is a collection of objects). In this case, we return all the selected
      - code: option
      - text: "s' values on the screen:"
    - text: js
    - button "Copy"
    - code: "const elems = document.querySelectorAll(\"select option:checked\"); const values = Array.prototype.map.call(elems, ({ value }) => value);"
    - paragraph:
      - text: You can also use
      - link "Array.from()":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array/from
        - code: Array.from()
      - text: to transform
      - code: elems
      - text: to an array, and then access the
      - code: map()
      - text: method.
