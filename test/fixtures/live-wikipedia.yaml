            - /url: /wiki/Screen_reader
          - text: ; notable examples include
          - link "NonVisual Desktop Access":
            - /url: /wiki/NonVisual_Desktop_Access
          - text: (NVDA) and
          - link "VoiceOver":
            - /url: /wiki/VoiceOver
      - row "Cognitive impairment reminder systems and prompting technology":
        - cell "Cognitive impairment"
