      - row "Perceptual disability, learning disability Talking textbooks, virtual keyboard":
        - cell "Perceptual disability, learning disability"
        - cell "Talking textbooks, virtual keyboard":
          - link "Talking textbooks":
            - /url: /wiki/Audiobook
          - text: ","
          - link "virtual keyboard":
            - /url: /wiki/Virtual_keyboard
      - row "Visual impairment, learning disability Modified monitor interface, magnification devices; reading service, e-text":
        - cell "Visual impairment, learning disability"
        - cell "Modified monitor interface, magnification devices; reading service, e-text":
