    - text: )
  - definition:
    - paragraph:
      - text: A
      - link "Future-like":
        - /url: asyncio-future.html#asyncio.Future
        - code: Future-like
      - text: object that runs a Python
      - link "coroutine":
        - /url: "#coroutine"
      - text: . Not thread-safe.
    - paragraph:
      - text: Tasks are used to run coroutines in event loops. If a coroutine awaits on a Future, the Task suspends the execution of the coroutine and waits for the completion of the Future. When the Future is
      - emphasis: done
      - text: ", the execution of the wrapped coroutine resumes."
    - paragraph: "Event loops use cooperative scheduling: an event loop runs one Task at a time. While a Task awaits for the completion of a Future, the event loop runs other Tasks, callbacks, or performs IO operations."
    - paragraph:
      - text: Use the high-level
      - link "asyncio.create_task()":
        - /url: "#asyncio.create_task"
        - code: asyncio.create_task()
      - text: function to create Tasks, or the low-level
      - link "loop.create_task()":
        - /url: asyncio-eventloop.html#asyncio.loop.create_task
        - code: loop.create_task()
      - text: or
      - link "ensure_future()":
        - /url: asyncio-future.html#asyncio.ensure_future
        - code: ensure_future()
      - text: functions. Manual instantiation of Tasks is discouraged.
    - paragraph:
      - text: To cancel a running Task use the
      - link "cancel()":
        - /url: "#asyncio.Task.cancel"
        - code: cancel()
      - text: method. Calling it will cause the Task to throw a
      - link "CancelledError":
        - /url: asyncio-exceptions.html#asyncio.CancelledError
        - code: CancelledError
      - text: exception into the wrapped coroutine. If a coroutine is awaiting on a Future object during cancellation, the Future object will be cancelled.
    - paragraph:
      - link "cancelled()":
        - /url: "#asyncio.Task.cancelled"
        - code: cancelled()
      - text: can be used to check if the Task was cancelled. The method returns
      - code: "True"
      - text: if the wrapped coroutine did not suppress the
      - link "CancelledError":
        - /url: asyncio-exceptions.html#asyncio.CancelledError
        - code: CancelledError
      - text: exception and was actually cancelled.
    - paragraph:
      - link "asyncio.Task":
        - /url: "#asyncio.Task"
        - code: asyncio.Task
      - text: inherits from
      - link "Future":
        - /url: asyncio-future.html#asyncio.Future
        - code: Future
      - text: all of its APIs except
      - link "Future.set_result()":
        - /url: asyncio-future.html#asyncio.Future.set_result
        - code: Future.set_result()
      - text: and
      - link "Future.set_exception()":
        - /url: asyncio-future.html#asyncio.Future.set_exception
        - code: Future.set_exception()
      - text: .
    - paragraph:
      - text: An optional keyword-only
      - emphasis: context
      - text: argument allows specifying a custom
      - link "contextvars.Context":
        - /url: contextvars.html#contextvars.Context
        - code: contextvars.Context
      - text: for the
      - emphasis: coro
      - text: to run in. If no
      - emphasis: context
      - text: is provided, the Task copies the current context and later runs its coroutine in the copied context.
    - paragraph:
      - text: An optional keyword-only
      - emphasis: eager_start
      - text: argument allows eagerly starting the execution of the
      - link "asyncio.Task":
        - /url: "#asyncio.Task"
        - code: asyncio.Task
      - text: at task creation time. If set to
      - code: "True"
      - text: and the event loop is running, the task will start executing the coroutine immediately, until the first time the coroutine blocks. If the coroutine returns or raises without blocking, the task will be finished eagerly and will skip scheduling to the event loop.
    - paragraph:
      - text: "Changed in version 3.7: Added support for the"
      - link "contextvars":
        - /url: contextvars.html#module-contextvars
        - code: contextvars
      - text: module.
    - paragraph:
      - text: "Changed in version 3.8: Added the"
      - emphasis: name
      - text: parameter.
    - paragraph:
      - text: "Deprecated since version 3.10: Deprecation warning is emitted if"
      - emphasis: loop
      - text: is not specified and there is no running event loop.
    - paragraph:
      - text: "Changed in version 3.11: Added the"
      - emphasis: context
      - text: parameter.
    - paragraph:
      - text: "Changed in version 3.12: Added the"
      - emphasis: eager_start
      - text: parameter.
    - term: done()
    - definition:
      - paragraph:
        - text: Return
        - code: "True"
        - text: if the Task is
        - emphasis: done
        - text: .
      - paragraph:
        - text: A Task is
        - emphasis: done
        - text: when the wrapped coroutine either returned a value, raised an exception, or the Task was cancelled.
    - term: result()
    - definition:
      - paragraph: Return the result of the Task.
      - paragraph:
        - text: If the Task is
        - emphasis: done
        - text: ", the result of the wrapped coroutine is returned (or if the coroutine raised an exception, that exception is re-raised.)"
      - paragraph:
        - text: If the Task has been
        - emphasis: cancelled
        - text: ", this method raises a"
        - link "CancelledError":
          - /url: asyncio-exceptions.html#asyncio.CancelledError
          - code: CancelledError
        - text: exception.
      - paragraph:
        - text: If the Task’s result isn’t yet available, this method raises an
        - link "InvalidStateError":
          - /url: asyncio-exceptions.html#asyncio.InvalidStateError
          - code: InvalidStateError
        - text: exception.
    - term: exception()
    - definition:
      - paragraph: Return the exception of the Task.
      - paragraph:
        - text: If the wrapped coroutine raised an exception that exception is returned. If the wrapped coroutine returned normally this method returns
        - code: None
        - text: .
      - paragraph:
        - text: If the Task has been
        - emphasis: cancelled
        - text: ", this method raises a"
        - link "CancelledError":
          - /url: asyncio-exceptions.html#asyncio.CancelledError
          - code: CancelledError
        - text: exception.
      - paragraph:
        - text: If the Task isn’t
        - emphasis: done
        - text: yet, this method raises an
        - link "InvalidStateError":
          - /url: asyncio-exceptions.html#asyncio.InvalidStateError
          - code: InvalidStateError
        - text: exception.
    - term:
