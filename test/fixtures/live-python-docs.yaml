      - text: ), coroutines begin execution synchronously during
      - link "Task":
        - /url: "#asyncio.Task"
        - code: Task
      - text: construction. Tasks are only scheduled on the event loop if they block. This can be a performance improvement as the overhead of loop scheduling is avoided for coroutines that complete synchronously.
    - paragraph: A common example where this is beneficial is coroutines which employ caching or memoization to avoid actual I/O when possible.
    - paragraph: "Note:"
    - paragraph: Immediate execution of the coroutine is a semantic change. If the coroutine returns or raises, the task is never scheduled to the event loop. If the coroutine execution blocks, the task is scheduled to the event loop. This change may introduce behavior changes to existing applications. For example, the application’s task execution order is likely to change.
    - paragraph: Added in version 3.12.
