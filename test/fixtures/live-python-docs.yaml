  - heading "Terminating a Task Group" [level=3]
  - paragraph: "While terminating a task group is not natively supported by the standard library, termination can be achieved by adding an exception-raising task to the task group and ignoring the raised exception:"
  - text: "import asyncio from asyncio import TaskGroup class TerminateTaskGroup(Exception): \"\"\"Exception raised to terminate a task group.\"\"\" async def force_terminate_task_group(): \"\"\"Used to force termination of a task group.\"\"\" raise TerminateTaskGroup() async def job(task_id, sleep_time): print(f'Task {task_id}: start') await asyncio.sleep(sleep_time) print(f'Task {task_id}: done') async def main(): try: async with TaskGroup() as group: # spawn some tasks group.create_task(job(1, 0.5)) group.create_task(job(2, 1.5)) # sleep for 1 second await asyncio.sleep(1) # add an exception-raising task to force the group to terminate group.create_task(force_terminate_task_group()) except* TerminateTaskGroup: pass asyncio.run(main())"
  - paragraph: "Expected output:"
