    - term:
      - text: get_stack(
      - emphasis: "*"
      - text: ","
      - emphasis: limit=None
      - text: )
    - definition:
      - paragraph: Return the list of stack frames for this Task.
      - paragraph: If the wrapped coroutine is not done, this returns the stack where it is suspended. If the coroutine has completed successfully or was cancelled, this returns an empty list. If the coroutine was terminated by an exception, this returns the list of traceback frames.
      - paragraph: The frames are always ordered from oldest to newest.
      - paragraph: Only one stack frame is returned for a suspended coroutine.
      - paragraph:
        - text: The optional
        - emphasis: limit
        - text: "argument sets the maximum number of frames to return; by default all available frames are returned. The ordering of the returned list differs depending on whether a stack or a traceback is returned: the newest frames of a stack are returned, but the oldest frames of a traceback are returned. (This matches the behavior of the traceback module.)"
    - term:
      - text: print_stack(
      - emphasis: "*"
      - text: ","
      - emphasis: limit=None
      - text: ","
      - emphasis: file=None
      - text: )
    - definition:
      - paragraph: Print the stack or traceback for this Task.
      - paragraph:
        - text: This produces output similar to that of the traceback module for the frames retrieved by
        - link "get_stack()":
          - /url: "#asyncio.Task.get_stack"
          - code: get_stack()
        - text: .
      - paragraph:
        - text: The
        - emphasis: limit
        - text: argument is passed to
        - link "get_stack()":
          - /url: "#asyncio.Task.get_stack"
          - code: get_stack()
        - text: directly.
      - paragraph:
        - text: The
        - emphasis: file
        - text: argument is an I/O stream to which the output is written; by default output is written to
        - link "sys.stdout":
          - /url: sys.html#sys.stdout
          - code: sys.stdout
        - text: .
    - term: get_coro()
    - definition:
      - paragraph:
        - text: Return the coroutine object wrapped by the
        - link "Task":
          - /url: "#asyncio.Task"
          - code: Task
        - text: .
      - paragraph: "Note:"
      - paragraph:
        - text: This will return
        - code: None
        - text: for Tasks which have already completed eagerly. See the
        - link "Eager Task Factory":
          - /url: "#eager-task-factory"
        - text: .
      - paragraph: Added in version 3.8.
      - paragraph:
        - text: "Changed in version 3.12: Newly added eager task execution means result may be"
        - code: None
        - text: .
    - term: get_context()
    - definition:
      - paragraph:
        - text: Return the
        - link "contextvars.Context":
          - /url: contextvars.html#contextvars.Context
          - code: contextvars.Context
        - text: object associated with the task.
      - paragraph: Added in version 3.12.
    - term: get_name()
    - definition:
      - paragraph: Return the name of the Task.
      - paragraph: If no name has been explicitly assigned to the Task, the default asyncio Task implementation generates a default name during instantiation.
      - paragraph: Added in version 3.8.
    - term:
      - text: set_name(
      - emphasis: value
      - text: )
    - definition:
      - paragraph: Set the name of the Task.
      - paragraph:
        - text: The
        - emphasis: value
        - text: argument can be any object, which is then converted to a string.
      - paragraph:
        - text: In the default Task implementation, the name will be visible in the
        - link "repr()":
          - /url: functions.html#repr
          - code: repr()
        - text: output of a task object.
      - paragraph: Added in version 3.8.
    - term:
      - text: cancel(
      - emphasis: msg=None
      - text: )
    - definition:
      - paragraph: Request the Task to be cancelled.
      - paragraph:
        - text: If the Task is already
        - emphasis: done
        - text: or
        - emphasis: cancelled
        - text: ", return"
        - code: "False"
        - text: ", otherwise, return"
        - code: "True"
        - text: .
      - paragraph:
        - text: The method arranges for a
        - link "CancelledError":
          - /url: asyncio-exceptions.html#asyncio.CancelledError
          - code: CancelledError
        - text: exception to be thrown into the wrapped coroutine on the next cycle of the event loop.
      - paragraph:
        - text: The coroutine then has a chance to clean up or even deny the request by suppressing the exception with a
        - link "try":
          - /url: ../reference/compound_stmts.html#try
          - code: try
        - text: … …
        - code: except CancelledError
        - text: …
        - link "finally":
          - /url: ../reference/compound_stmts.html#finally
          - code: finally
        - text: block. Therefore, unlike
        - link "Future.cancel()":
          - /url: asyncio-future.html#asyncio.Future.cancel
          - code: Future.cancel()
        - text: ","
        - link "Task.cancel()":
          - /url: "#asyncio.Task.cancel"
          - code: Task.cancel()
        - text: does not guarantee that the Task will be cancelled, although suppressing cancellation completely is not common and is actively discouraged. Should the coroutine nevertheless decide to suppress the cancellation, it needs to call
        - link "Task.uncancel()":
          - /url: "#asyncio.Task.uncancel"
          - code: Task.uncancel()
        - text: in addition to catching the exception.
      - paragraph:
        - text: "Changed in version 3.9: Added the"
        - emphasis: msg
        - text: parameter.
      - paragraph:
        - text: "Changed in version 3.11: The"
        - code: msg
        - text: parameter is propagated from cancelled task to its awaiter.
      - paragraph: "The following example illustrates how coroutines can intercept the cancellation request:"
      - text: "async def cancel_me(): print('cancel_me(): before sleep') try: # Wait for 1 hour await asyncio.sleep(3600) except asyncio.CancelledError: print('cancel_me(): cancel sleep') raise finally: print('cancel_me(): after sleep') async def main(): # Create a \"cancel_me\" Task task = asyncio.create_task(cancel_me()) # Wait for 1 second await asyncio.sleep(1) task.cancel() try: await task except asyncio.CancelledError: print(\"main(): cancel_me is cancelled now\") asyncio.run(main()) # Expected output: # # cancel_me(): before sleep # cancel_me(): cancel sleep # cancel_me(): after sleep # main(): cancel_me is cancelled now"
    - term: cancelled()
    - definition:
      - paragraph:
        - text: Return
        - code: "True"
        - text: if the Task is
        - emphasis: cancelled
        - text: .
      - paragraph:
        - text: The Task is
        - emphasis: cancelled
        - text: when the cancellation was requested with
        - link "cancel()":
          - /url: "#asyncio.Task.cancel"
          - code: cancel()
        - text: and the wrapped coroutine propagated the
        - link "CancelledError":
          - /url: asyncio-exceptions.html#asyncio.CancelledError
          - code: CancelledError
        - text: exception thrown into it.
    - term: uncancel()
    - definition:
      - paragraph: Decrement the count of cancellation requests to this Task.
      - paragraph: Returns the remaining number of cancellation requests.
      - paragraph:
        - text: Note that once execution of a cancelled task completed, further calls to
        - link "uncancel()":
          - /url: "#asyncio.Task.uncancel"
          - code: uncancel()
        - text: are ineffective.
      - paragraph: Added in version 3.11.
      - paragraph:
        - text: This method is used by asyncio’s internals and isn’t expected to be used by end-user code. In particular, if a Task gets successfully uncancelled, this allows for elements of structured concurrency like
        - link "Task Groups":
          - /url: "#taskgroups"
        - text: and
        - link "asyncio.timeout()":
          - /url: "#asyncio.timeout"
          - code: asyncio.timeout()
        - text: "to continue running, isolating cancellation to the respective structured block. For example:"
      - text: "async def make_request_with_timeout(): try: async with asyncio.timeout(1): # Structured block affected by the timeout: await make_request() await make_another_request() except TimeoutError: log(\"There was a timeout\") # Outer code not affected by the timeout: await unrelated_code()"
      - paragraph:
        - text: While the block with
        - code: make_request()
        - text: and
        - code: make_another_request()
        - text: might get cancelled due to the timeout,
        - code: unrelated_code()
        - text: should continue running even in case of the timeout. This is implemented with
        - link "uncancel()":
          - /url: "#asyncio.Task.uncancel"
          - code: uncancel()
        - text: .
        - link "TaskGroup":
          - /url: "#asyncio.TaskGroup"
          - code: TaskGroup
        - text: context managers use
        - link "uncancel()":
          - /url: "#asyncio.Task.uncancel"
          - code: uncancel()
        - text: in a similar fashion.
      - paragraph:
        - text: If end-user code is, for some reason, suppressing cancellation by catching
        - link "CancelledError":
          - /url: asyncio-exceptions.html#asyncio.CancelledError
          - code: CancelledError
        - text: ", it needs to call this method to remove the cancellation state."
      - paragraph:
        - text: When this method decrements the cancellation count to zero, the method checks if a previous
        - link "cancel()":
          - /url: "#asyncio.Task.cancel"
          - code: cancel()
        - text: call had arranged for
        - link "CancelledError":
          - /url: asyncio-exceptions.html#asyncio.CancelledError
          - code: CancelledError
        - text: to be thrown into the task. If it hasn’t been thrown yet, that arrangement will be rescinded (by resetting the internal
        - code: _must_cancel
        - text: flag).
    - paragraph: "Changed in version 3.13: Changed to rescind pending cancellation requests upon reaching zero."
    - term: cancelling()
    - definition:
      - paragraph:
        - text: Return the number of pending cancellation requests to this Task, i.e., the number of calls to
        - link "cancel()":
          - /url: "#asyncio.Task.cancel"
          - code: cancel()
        - text: less the number of
        - link "uncancel()":
          - /url: "#asyncio.Task.uncancel"
          - code: uncancel()
        - text: calls.
      - paragraph:
        - text: Note that if this number is greater than zero but the Task is still executing,
        - link "cancelled()":
          - /url: "#asyncio.Task.cancelled"
          - code: cancelled()
        - text: will still return
        - code: "False"
        - text: . This is because this number can be lowered by calling
        - link "uncancel()":
          - /url: "#asyncio.Task.uncancel"
          - code: uncancel()
        - text: ", which can lead to the task not being cancelled after all if the cancellation requests go down to zero."
      - paragraph:
        - text: This method is used by asyncio’s internals and isn’t expected to be used by end-user code. See
        - link "uncancel()":
          - /url: "#asyncio.Task.uncancel"
          - code: uncancel()
        - text: for more details.
      - paragraph: Added in version 3.11.
