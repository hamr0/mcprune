- main:
  - heading "Coroutines and Tasks" [level=1]
  - paragraph: This section outlines high-level asyncio APIs to work with coroutines and Tasks.
  - navigation:
    - list:
      - listitem:
        - paragraph:
          - link "Coroutines":
            - /url: "#coroutines"
      - listitem:
        - paragraph:
          - link "Awaitables":
            - /url: "#awaitables"
      - listitem:
        - paragraph:
          - link "Creating Tasks":
            - /url: "#creating-tasks"
      - listitem:
        - paragraph:
          - link "Task Cancellation":
            - /url: "#task-cancellation"
      - listitem:
        - paragraph:
          - link "Task Groups":
            - /url: "#task-groups"
      - listitem:
        - paragraph:
          - link "Sleeping":
            - /url: "#sleeping"
      - listitem:
        - paragraph:
          - link "Running Tasks Concurrently":
            - /url: "#running-tasks-concurrently"
      - listitem:
        - paragraph:
          - link "Eager Task Factory":
            - /url: "#eager-task-factory"
      - listitem:
        - paragraph:
          - link "Shielding From Cancellation":
            - /url: "#shielding-from-cancellation"
      - listitem:
        - paragraph:
          - link "Timeouts":
            - /url: "#timeouts"
      - listitem:
        - paragraph:
          - link "Waiting Primitives":
            - /url: "#waiting-primitives"
      - listitem:
        - paragraph:
          - link "Running in Threads":
            - /url: "#running-in-threads"
      - listitem:
        - paragraph:
          - link "Scheduling From Other Threads":
            - /url: "#scheduling-from-other-threads"
      - listitem:
        - paragraph:
          - link "Introspection":
            - /url: "#introspection"
      - listitem:
        - paragraph:
          - link "Task Object":
            - /url: "#task-object"
  - heading "Coroutines" [level=2]:
    - link "Coroutines":
      - /url: "#id2"
  - paragraph:
    - strong: "Source code:"
    - link "Lib/asyncio/coroutines.py":
      - /url: https://github.com/python/cpython/tree/3.14/Lib/asyncio/coroutines.py
  - separator
  - paragraph:
    - link "Coroutines":
      - /url: ../glossary.html#term-coroutine
    - text: "declared with the async/await syntax is the preferred way of writing asyncio applications. For example, the following snippet of code prints “hello”, waits 1 second, and then prints “world”:"
  - text: ">>> import asyncio >>> async def main(): ... print('hello') ... await asyncio.sleep(1) ... print('world') >>> asyncio.run(main()) hello world"
  - paragraph: "Note that simply calling a coroutine will not schedule it to be executed:"
  - text: ">>> main() <coroutine object main at 0x1053bb7c8>"
  - paragraph: "To actually run a coroutine, asyncio provides the following mechanisms:"
  - list:
    - listitem:
      - paragraph:
        - text: The
        - link "asyncio.run()":
          - /url: asyncio-runner.html#asyncio.run
          - code: asyncio.run()
        - text: function to run the top-level entry point “main()” function (see the above example.)
    - listitem:
      - paragraph:
        - text: Awaiting on a coroutine. The following snippet of code will print “hello” after waiting for 1 second, and then print “world” after waiting for
        - emphasis: another
        - text: "2 seconds:"
      - text: "import asyncio import time async def say_after(delay, what): await asyncio.sleep(delay) print(what) async def main(): print(f\"started at {time.strftime('%X')}\") await say_after(1, 'hello') await say_after(2, 'world') print(f\"finished at {time.strftime('%X')}\") asyncio.run(main())"
      - paragraph: "Expected output:"
      - text: started at 17:13:52 hello world finished at 17:13:55
    - listitem:
      - paragraph:
        - text: The
        - link "asyncio.create_task()":
          - /url: "#asyncio.create_task"
          - code: asyncio.create_task()
        - text: function to run coroutines concurrently as asyncio
        - link "Tasks":
          - /url: "#asyncio.Task"
          - code: Tasks
        - text: .
      - paragraph:
        - text: Let’s modify the above example and run two
        - code: say_after
        - text: coroutines
        - emphasis: concurrently
        - text: ":"
      - text: "async def main(): task1 = asyncio.create_task( say_after(1, 'hello')) task2 = asyncio.create_task( say_after(2, 'world')) print(f\"started at {time.strftime('%X')}\") # Wait until both tasks are completed (should take # around 2 seconds.) await task1 await task2 print(f\"finished at {time.strftime('%X')}\")"
      - paragraph: "Note that expected output now shows that the snippet runs 1 second faster than before:"
      - text: started at 17:14:32 hello world finished at 17:14:34
    - listitem:
      - paragraph:
        - text: The
        - link "asyncio.TaskGroup":
          - /url: "#asyncio.TaskGroup"
          - code: asyncio.TaskGroup
        - text: class provides a more modern alternative to
        - link "create_task()":
          - /url: "#asyncio.create_task"
          - code: create_task()
        - text: ". Using this API, the last example becomes:"
      - text: "async def main(): async with asyncio.TaskGroup() as tg: task1 = tg.create_task( say_after(1, 'hello')) task2 = tg.create_task( say_after(2, 'world')) print(f\"started at {time.strftime('%X')}\") # The await is implicit when the context manager exits. print(f\"finished at {time.strftime('%X')}\")"
      - paragraph: The timing and output should be the same as for the previous version.
      - paragraph:
        - text: "Added in version 3.11:"
        - link "asyncio.TaskGroup":
          - /url: "#asyncio.TaskGroup"
          - code: asyncio.TaskGroup
        - text: .
  - heading "Awaitables" [level=2]:
    - link "Awaitables":
      - /url: "#id3"
  - paragraph:
    - text: We say that an object is an
    - strong: awaitable
    - text: object if it can be used in an
    - link "await":
      - /url: ../reference/expressions.html#await
      - code: await
    - text: expression. Many asyncio APIs are designed to accept awaitables.
  - paragraph:
    - text: There are three main types of
    - emphasis: awaitable
    - text: "objects:"
    - strong: coroutines
    - text: ","
    - strong: Tasks
    - text: ", and"
    - strong: Futures
    - text: .
  - paragraph: Coroutines
  - paragraph:
    - text: Python coroutines are
    - emphasis: awaitables
    - text: "and therefore can be awaited from other coroutines:"
  - text: "import asyncio async def nested(): return 42 async def main(): # Nothing happens if we just call \"nested()\". # A coroutine object is created but not awaited, # so it *won't run at all*. nested() # will raise a \"RuntimeWarning\". # Let's do it differently now and await it: print(await nested()) # will print \"42\". asyncio.run(main())"
  - paragraph: "Important:"
  - paragraph: "In this documentation the term “coroutine” can be used for two closely related concepts:"
  - list:
    - listitem:
      - paragraph:
        - text: a
        - emphasis: coroutine function
        - text: ": an"
        - link "async def":
          - /url: ../reference/compound_stmts.html#async-def
          - code: async def
        - text: function;
    - listitem:
      - paragraph:
        - text: a
        - emphasis: coroutine object
        - text: ": an object returned by calling a"
        - emphasis: coroutine function
        - text: .
  - paragraph: Tasks
  - paragraph:
    - emphasis: Tasks
    - text: are used to schedule coroutines
    - emphasis: concurrently
    - text: .
  - paragraph:
    - text: When a coroutine is wrapped into a
    - emphasis: Task
    - text: with functions like
    - link "asyncio.create_task()":
      - /url: "#asyncio.create_task"
      - code: asyncio.create_task()
    - text: "the coroutine is automatically scheduled to run soon:"
  - text: "import asyncio async def nested(): return 42 async def main(): # Schedule nested() to run soon concurrently # with \"main()\". task = asyncio.create_task(nested()) # \"task\" can now be used to cancel \"nested()\", or # can simply be awaited to wait until it is complete: await task asyncio.run(main())"
  - paragraph: Futures
  - paragraph:
    - text: A
    - link "Future":
      - /url: asyncio-future.html#asyncio.Future
      - code: Future
    - text: is a special
    - strong: low-level
    - text: awaitable object that represents an
    - strong: eventual result
    - text: of an asynchronous operation.
  - paragraph:
    - text: When a Future object is
    - emphasis: awaited
    - text: it means that the coroutine will wait until the Future is resolved in some other place.
  - paragraph: Future objects in asyncio are needed to allow callback-based code to be used with async/await.
  - paragraph:
    - text: Normally
    - strong: there is no need
    - text: to create Future objects at the application level code.
  - paragraph: "Future objects, sometimes exposed by libraries and some asyncio APIs, can be awaited:"
  - text: "async def main(): await function_that_returns_a_future_object() # this is also valid: await asyncio.gather( function_that_returns_a_future_object(), some_python_coroutine() )"
  - paragraph:
    - text: A good example of a low-level function that returns a Future object is
    - link "loop.run_in_executor()":
      - /url: asyncio-eventloop.html#asyncio.loop.run_in_executor
      - code: loop.run_in_executor()
    - text: .
  - heading "Creating Tasks" [level=2]:
    - link "Creating Tasks":
      - /url: "#id4"
  - paragraph:
    - strong: "Source code:"
    - link "Lib/asyncio/tasks.py":
      - /url: https://github.com/python/cpython/tree/3.14/Lib/asyncio/tasks.py
  - separator
  - term:
    - text: asyncio.create_task(
    - emphasis: coro
    - text: ","
    - emphasis: "*"
    - text: ","
    - emphasis: name=None
    - text: ","
    - emphasis: context=None
    - text: ","
    - emphasis: eager_start=None
    - text: ","
    - emphasis: "**kwargs"
    - text: )
  - definition:
    - paragraph:
      - text: Wrap the
      - emphasis: coro
      - link "coroutine":
        - /url: "#coroutine"
      - text: into a
      - link "Task":
        - /url: "#asyncio.Task"
        - code: Task
      - text: and schedule its execution. Return the Task object.
    - paragraph:
      - text: The full function signature is largely the same as that of the
      - link "Task":
        - /url: "#asyncio.Task"
        - code: Task
      - text: constructor (or factory) - all of the keyword arguments to this function are passed through to that interface.
    - paragraph:
      - text: An optional keyword-only
      - emphasis: context
      - text: argument allows specifying a custom
      - link "contextvars.Context":
        - /url: contextvars.html#contextvars.Context
        - code: contextvars.Context
      - text: for the
      - emphasis: coro
      - text: to run in. The current context copy is created when no
      - emphasis: context
      - text: is provided.
    - paragraph:
      - text: An optional keyword-only
      - emphasis: eager_start
      - text: argument allows specifying if the task should execute eagerly during the call to create_task, or be scheduled later. If
      - emphasis: eager_start
      - text: is not passed the mode set by
      - link "loop.set_task_factory()":
        - /url: asyncio-eventloop.html#asyncio.loop.set_task_factory
        - code: loop.set_task_factory()
      - text: will be used.
    - paragraph:
      - text: The task is executed in the loop returned by
      - link "get_running_loop()":
        - /url: asyncio-eventloop.html#asyncio.get_running_loop
        - code: get_running_loop()
      - text: ","
      - link "RuntimeError":
        - /url: exceptions.html#RuntimeError
        - code: RuntimeError
      - text: is raised if there is no running loop in current thread.
    - paragraph: "Note:"
    - paragraph:
      - link "asyncio.TaskGroup.create_task()":
        - /url: "#asyncio.TaskGroup.create_task"
        - code: asyncio.TaskGroup.create_task()
      - text: is a new alternative leveraging structural concurrency; it allows for waiting for a group of related tasks with strong safety guarantees.
    - paragraph: "Important:"
    - paragraph: "Save a reference to the result of this function, to avoid a task disappearing mid-execution. The event loop only keeps weak references to tasks. A task that isn’t referenced elsewhere may get garbage collected at any time, even before it’s done. For reliable “fire-and-forget” background tasks, gather them in a collection:"
    - text: "background_tasks = set() for i in range(10): task = asyncio.create_task(some_coro(param=i)) # Add task to the set. This creates a strong reference. background_tasks.add(task) # To prevent keeping references to finished tasks forever, # make each task remove its own reference from the set after # completion: task.add_done_callback(background_tasks.discard)"
    - paragraph: Added in version 3.7.
    - paragraph:
      - text: "Changed in version 3.8: Added the"
      - emphasis: name
      - text: parameter.
    - paragraph:
      - text: "Changed in version 3.11: Added the"
      - emphasis: context
      - text: parameter.
    - paragraph:
      - text: "Changed in version 3.14: Added the"
      - emphasis: eager_start
      - text: parameter by passing on all
      - emphasis: kwargs
      - text: .
  - heading "Task Cancellation" [level=2]:
    - link "Task Cancellation":
      - /url: "#id5"
  - paragraph:
    - text: Tasks can easily and safely be cancelled. When a task is cancelled,
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: will be raised in the task at the next opportunity.
  - paragraph:
    - text: It is recommended that coroutines use
    - code: try/finally
    - text: blocks to robustly perform clean-up logic. In case
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: is explicitly caught, it should generally be propagated when clean-up is complete.
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: directly subclasses
    - link "BaseException":
      - /url: exceptions.html#BaseException
      - code: BaseException
    - text: so most code will not need to be aware of it.
  - paragraph:
    - text: The asyncio components that enable structured concurrency, like
    - link "asyncio.TaskGroup":
      - /url: "#asyncio.TaskGroup"
      - code: asyncio.TaskGroup
    - text: and
    - link "asyncio.timeout()":
      - /url: "#asyncio.timeout"
      - code: asyncio.timeout()
    - text: ", are implemented using cancellation internally and might misbehave if a coroutine swallows"
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: . Similarly, user code should not generally call
    - link "uncancel":
      - /url: "#asyncio.Task.uncancel"
      - code: uncancel
    - text: . However, in cases when suppressing
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: is truly desired, it is necessary to also call
    - code: uncancel()
    - text: to completely remove the cancellation state.
  - heading "Task Groups" [level=2]:
    - link "Task Groups":
      - /url: "#id6"
  - paragraph: Task groups combine a task creation API with a convenient and reliable way to wait for all tasks in the group to finish.
  - term:
    - emphasis: class
    - text: asyncio.TaskGroup
  - definition:
    - paragraph:
      - text: An
      - link "asynchronous context manager":
        - /url: ../reference/datamodel.html#async-context-managers
      - text: holding a group of tasks. Tasks can be added to the group using
      - link "create_task()":
        - /url: "#asyncio.create_task"
        - code: create_task()
      - text: . All tasks are awaited when the context manager exits.
    - paragraph: Added in version 3.11.
    - term:
      - text: create_task(
      - emphasis: coro
      - text: ","
      - emphasis: "*"
      - text: ","
      - emphasis: name=None
      - text: ","
      - emphasis: context=None
      - text: ","
      - emphasis: eager_start=None
      - text: ","
      - emphasis: "**kwargs"
      - text: )
    - definition:
      - paragraph:
        - text: Create a task in this task group. The signature matches that of
        - link "asyncio.create_task()":
          - /url: "#asyncio.create_task"
          - code: asyncio.create_task()
        - text: . If the task group is inactive (e.g. not yet entered, already finished, or in the process of shutting down), we will close the given
        - code: coro
        - text: .
      - paragraph: "Changed in version 3.13: Close the given coroutine if the task group is not active."
      - paragraph:
        - text: "Changed in version 3.14: Passes on all"
        - emphasis: kwargs
        - text: to
        - link "loop.create_task()":
          - /url: asyncio-eventloop.html#asyncio.loop.create_task
          - code: loop.create_task()
  - paragraph: "Example:"
  - text: "async def main(): async with asyncio.TaskGroup() as tg: task1 = tg.create_task(some_coro(...)) task2 = tg.create_task(another_coro(...)) print(f\"Both tasks have completed now: {task1.result()}, {task2.result()}\")"
  - paragraph:
    - text: The
    - code: async with
    - text: statement will wait for all tasks in the group to finish. While waiting, new tasks may still be added to the group (for example, by passing
    - code: tg
    - text: into one of the coroutines and calling
    - code: tg.create_task()
    - text: in that coroutine). Once the last task has finished and the
    - code: async with
    - text: block is exited, no new tasks may be added to the group.
  - paragraph:
    - text: The first time any of the tasks belonging to the group fails with an exception other than
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: ", the remaining tasks in the group are cancelled. No further tasks can then be added to the group. At this point, if the body of the"
    - code: async with
    - text: statement is still active (i.e.,
    - link "__aexit__()":
      - /url: ../reference/datamodel.html#object.__aexit__
      - code: __aexit__()
    - text: hasn’t been called yet), the task directly containing the
    - code: async with
    - text: statement is also cancelled. The resulting
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: will interrupt an
    - code: await
    - text: ", but it will not bubble out of the containing"
    - code: async with
    - text: statement.
  - paragraph:
    - text: Once all tasks have finished, if any tasks have failed with an exception other than
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: ", those exceptions are combined in an"
    - link "ExceptionGroup":
      - /url: exceptions.html#ExceptionGroup
      - code: ExceptionGroup
    - text: or
    - link "BaseExceptionGroup":
      - /url: exceptions.html#BaseExceptionGroup
      - code: BaseExceptionGroup
    - text: (as appropriate; see their documentation) which is then raised.
  - paragraph:
    - text: "Two base exceptions are treated specially: If any task fails with"
    - link "KeyboardInterrupt":
      - /url: exceptions.html#KeyboardInterrupt
      - code: KeyboardInterrupt
    - text: or
    - link "SystemExit":
      - /url: exceptions.html#SystemExit
      - code: SystemExit
    - text: ", the task group still cancels the remaining tasks and waits for them, but then the initial"
    - link "KeyboardInterrupt":
      - /url: exceptions.html#KeyboardInterrupt
      - code: KeyboardInterrupt
    - text: or
    - link "SystemExit":
      - /url: exceptions.html#SystemExit
      - code: SystemExit
    - text: is re-raised instead of
    - link "ExceptionGroup":
      - /url: exceptions.html#ExceptionGroup
      - code: ExceptionGroup
    - text: or
    - link "BaseExceptionGroup":
      - /url: exceptions.html#BaseExceptionGroup
      - code: BaseExceptionGroup
    - text: .
  - paragraph:
    - text: If the body of the
    - code: async with
    - text: statement exits with an exception (so
    - link "__aexit__()":
      - /url: ../reference/datamodel.html#object.__aexit__
      - code: __aexit__()
    - text: "is called with an exception set), this is treated the same as if one of the tasks failed: the remaining tasks are cancelled and then waited for, and non-cancellation exceptions are grouped into an exception group and raised. The exception passed into"
    - link "__aexit__()":
      - /url: ../reference/datamodel.html#object.__aexit__
      - code: __aexit__()
    - text: ", unless it is"
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: ", is also included in the exception group. The same special case is made for"
    - link "KeyboardInterrupt":
      - /url: exceptions.html#KeyboardInterrupt
      - code: KeyboardInterrupt
    - text: and
    - link "SystemExit":
      - /url: exceptions.html#SystemExit
      - code: SystemExit
    - text: as in the previous paragraph.
  - paragraph:
    - text: Task groups are careful not to mix up the internal cancellation used to “wake up” their
    - link "__aexit__()":
      - /url: ../reference/datamodel.html#object.__aexit__
      - code: __aexit__()
    - text: with cancellation requests for the task in which they are running made by other parties. In particular, when one task group is syntactically nested in another, and both experience an exception in one of their child tasks simultaneously, the inner task group will process its exceptions, and then the outer task group will receive another cancellation and process its own exceptions.
  - paragraph:
    - text: In the case where a task group is cancelled externally and also must raise an
    - link "ExceptionGroup":
      - /url: exceptions.html#ExceptionGroup
      - code: ExceptionGroup
    - text: ", it will call the parent task’s"
    - link "cancel()":
      - /url: "#asyncio.Task.cancel"
      - code: cancel()
    - text: method. This ensures that a
    - link "asyncio.CancelledError":
      - /url: asyncio-exceptions.html#asyncio.CancelledError
      - code: asyncio.CancelledError
    - text: will be raised at the next
    - link "await":
      - /url: ../reference/expressions.html#await
      - code: await
    - text: ", so the cancellation is not lost."
  - paragraph:
    - text: Task groups preserve the cancellation count reported by
