  - heading "Mobility impairments" [level=4]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=16
  - text: "]"
  - paragraph:
    - text: One of the first areas where information technology improved the quality of life for disabled individuals is the voice operated wheelchair. Quadriplegics have the most profound disability, and the voice operated wheelchair technology was first developed in 1977 to provide increased mobility. The original version replaced the joystick system with a module that recognized 8 commands. Many other technology accommodation improvements have evolved from this initial development.
    - superscript:
      - link "[68]":
        - /url: "#cite_note-68"
  - paragraph:
    - text: Missing arms or fingers may make the use of a keyboard and mouse difficult or impossible. Technological improvements such as
    - link "speech recognition":
      - /url: /wiki/Speech_recognition
    - text: devices and software can improve access.
  - heading "Communication (including speech) impairments" [level=4]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=17
  - text: "]"
  - paragraph: A communication disorder interferes with the ability to produce clearly understandable speech. There can be many different causes, such as nerve degeneration, muscle degeneration, stroke, and vocal cord injury. The modern method to deal with speaking disabilities has been to provide a text interface for a speech synthesizer for complete vocal disability. This can be a great improvement for people that have been limited to the use of a throat vibrator to produce speech since the 1960s.
  - heading "Hearing impairment" [level=4]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=18
  - text: "]"
  - paragraph:
    - text: An individual satisfies the definition of hearing disabled when hearing loss is about 30 dB for a single frequency, but this is not always perceptible as a disability.
    - superscript:
      - link "[69]":
        - /url: "#cite_note-69"
    - text: For example, loss of sensitivity in one ear interferes with
    - link "sound localization":
      - /url: /wiki/Sound_localization
    - text: (directional hearing), which can interfere with communication in a crowd. This is often recognized when certain words are confused during normal conversation. This can interfere with voice-only interfaces, like automated customer service telephone systems, because it is sometimes difficult to increase the volume and repeat the message.
  - paragraph: Mild to moderate hearing loss may be accommodated with a hearing aid that amplifies ambient sounds. Portable devices with speed recognition that can produce text can reduce problems associated with understanding conversation. This kind of hearing loss is relatively common, and this often grows worse with age.
  - paragraph:
    - text: The modern method to deal with profound hearing disability is the Internet using email or word processing applications. The
    - link "telecommunications device for the deaf":
      - /url: /wiki/Telecommunications_device_for_the_deaf
    - text: (TDD) became available in the form of the
    - link "teletype":
      - /url: /wiki/Teleprinter
    - text: (TTY) during the 1960s. These devices consist of a keyboard, display and modem that connects two or more of these devices using a dedicated wire or plain old telephone service.
  - paragraph:
    - text: Modern
    - link "computer animation":
      - /url: /wiki/Computer_animation
    - text: allows for
    - link "sign language":
      - /url: /wiki/Sign_language
    - text: avatars to be integrated into public areas. This technology could potentially make train station announcements, news broadcasts, etc. accessible when a human interpreter is not available.
    - superscript:
      - link "[70]":
        - /url: "#cite_note-70"
    - superscript:
      - link "[71]":
        - /url: "#cite_note-71"
    - text: Sign language can also be incorporated into film; for example, all movies shown in Brazilian movie theaters must have a
    - link "Brazilian Sign Language":
      - /url: /wiki/Brazilian_Sign_Language
    - text: video track available to play alongside the film via a
    - link "second screen":
      - /url: /wiki/Second_screen
    - text: .
    - superscript:
      - link "[72]":
        - /url: "#cite_note-72"
    - superscript:
      - link "[73]":
        - /url: "#cite_note-73"
  - heading "Visual impairments" [level=4]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=19
  - text: "]"
  - paragraph: A wide array of technology products is available to assist with visual impairment. These include screen magnification for monitors, screen-reading software for computers and mobile devices, mouse-over speech synthesis for browsing, braille displays, braille printers, braille cameras, and voice-activated phones and tablets.
  - paragraph: One emerging product that will make ordinary computer displays available for the blind is the refreshable tactile display, which is very different from a conventional braille display. This provides a raised surface corresponding to the bright and dim spots on a conventional display. An example is the Touch Sight Camera for the Blind.
  - paragraph:
    - link "Speech Synthesis Markup Language":
      - /url: /wiki/Speech_Synthesis_Markup_Language
    - superscript:
      - link "[74]":
        - /url: "#cite_note-74"
    - text: and
    - link "Speech Recognition Grammar Specification":
      - /url: /wiki/Speech_Recognition_Grammar_Specification
    - superscript:
      - link "[75]":
        - /url: "#cite_note-75"
    - text: ) are relatively recent technologies intended to standardize communication interfaces using Augmented
    - link "BNF":
      - /url: /wiki/Backus%E2%80%93Naur_form
    - text: Form and
    - link "XML":
      - /url: /wiki/XML
    - text: Form. These technologies assist visual impairments and physical impairment by providing interactive access to web content without the need to visually observe the content. While these technologies provides access for visually impaired individuals, the primary benefactor has been automated systems that replace live human customer service representatives that handle telephone calls.
  - heading "Cognitive impairments" [level=4]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=20
  - text: "]"
  - paragraph:
    - text: Cognitive accessibility refers to a system or application being suitable for use by individuals with developmental disabilities (DD)
    - superscript:
      - link "[76]":
        - /url: "#cite_note-76"
    - text: or intellectual disabilities (ID).
    - superscript:
      - link "[77]":
        - /url: "#cite_note-77"
    - text: Generally, this also includes neurotypical users. Systems specifically designed for users with ID are often referred to as adapted (aka assistive technology), and such systems may not be helpful for neurotypical persons.
    - superscript:
      - link "[78]":
        - /url: "#cite_note-78"
    - text: Systems that are usable for persons with ID are often referred to as adaptable. Adapted systems may include simplified interfaces and internal logic. One such system is the '
    - link "Simple Wikipedia":
      - /url: /wiki/Simple_Wikipedia
    - text: .' A system that is adaptable may include travel ticket dispensers and user interfaces with dual modes (standard and expert). Design for cognitive accessibility is often bounded by defining users with abilities above certain levels.
  - paragraph:
    - text: Most of the supporting work for design for cognitive accessibility is for adapted systems, a subset of assistive technology. There have been some attempts to support adaptable systems,
    - superscript:
      - link "[79]":
        - /url: "#cite_note-79"
    - text: but not much progress has been made
  - paragraph: "Problem framing: One of the most daunting problems with any sort of project involving access by cognitively disabled persons is understanding the end users. Also, in many instances, systems for this group of end-users also involve a secondary group of caregivers. Both groups need to have their needs and wants carefully considered."
  - paragraph:
    - text: "Standards There are several frameworks and standards to guide developers for adapted systems. Most notable are the ISO group and Resna. Examples of these standards: RESNA - ANSI/RESNA CA-1:2016"
    - superscript:
      - link "[80]":
        - /url: "#cite_note-80"
    - text: ISO - ISO-TC173-WG10_N238_ISO 21801-1 2020
    - superscript:
      - link "[81]":
        - /url: "#cite_note-81"
    - text: As well as parts of the World Wide Web Consortium's WAI-IG,
    - superscript:
      - link "[82]":
        - /url: "#cite_note-82"
    - text: and WebAIM's Cognitive accessibility design considerations.
    - superscript:
      - link "[83]":
        - /url: "#cite_note-83"
    - text: Microsoft
    - superscript:
      - link "[84]":
        - /url: "#cite_note-84"
    - text: and other design frameworks and tools have also published sets of guidelines.
  - heading "Web accessibility" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=21
  - text: "]"
  - note:
    - text: "Main article:"
    - link "Web accessibility":
      - /url: /wiki/Web_accessibility
  - heading "International standards and guidelines" [level=4]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=22
  - text: "]"
  - paragraph:
    - text: There have been a few major movements to coordinate a set of guidelines for accessibility for the
    - link "web":
      - /url: /wiki/World_Wide_Web
    - text: . The first and most well known is The
    - link "Web Accessibility Initiative":
      - /url: /wiki/Web_Accessibility_Initiative
    - text: (WAI), which is part of the World Wide Web Consortium (
    - link "W3C":
      - /url: /wiki/W3C
    - text: ). This organization developed the
    - link "Web Content Accessibility Guidelines":
      - /url: /wiki/Web_Content_Accessibility_Guidelines
    - text: (WCAG) 1.0 and 2.0 which explain how to make Web content accessible to everyone, including people with disabilities. Web "content" generally refers to the information in a Web page or Web application, including text, images, forms, and sounds. (More specific definitions are available in the WCAG documents.)
    - superscript:
      - link "[85]":
        - /url: "#cite_note-85"
  - paragraph:
    - text: The WCAG is separated into three levels of compliance, A, AA and AAA. Each level requires a stricter set of conformance guidelines, such as different versions of
    - link "HTML":
      - /url: /wiki/HTML
    - text: (Transitional vs Strict) and other techniques that need to be incorporated into coding before accomplishing validation. Online tools allow users to submit their website and automatically run it through the WCAG guidelines and produce a report, stating whether or not they conform to each level of compliance.
    - link "Adobe Dreamweaver":
      - /url: /wiki/Adobe_Dreamweaver
    - text: also offers plugins which allow web developers to test these guidelines on their work from within the program.
  - paragraph:
    - text: The
    - link "ISO/IEC JTC1 SC36 WG7":
      - /url: /wiki/ISO/IEC_JTC_1/SC_36#WG_7_Culture.2C_Language.2C_and_Human_Functioning_Activities
    - text: "24751 Individualized Adaptability and Accessibility in e-learning, education and training series is freely available and made of 3 parts: Individualized Adaptability and Accessibility in e-learning, education and training, Standards inventory and Guidance on user needs mapping."
  - paragraph:
    - text: Another source of web accessibility guidance comes from the
    - link "US government":
      - /url: /wiki/US_government
    - text: . In response to
    - link "Section 508 of the US Rehabilitation Act":
      - /url: /wiki/Rehabilitation_Act_of_1973#Section_508
    - text: ", the Access Board developed standards to which U.S. federal agencies must comply in order to make their sites accessible. The U.S. General Services Administration has developed a website where one can take online training courses for free to learn about these rules."
    - superscript:
      - link "[86]":
        - /url: "#cite_note-86"
  - heading "Web accessibility features" [level=4]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=23
  - text: "]"
  - paragraph: "Examples of accessibility features include:"
  - list:
    - listitem:
      - link "WAI":
        - /url: /wiki/Web_Accessibility_Initiative
      - text: "-AA compliance with the"
      - link "WAI's WCAG":
        - /url: /wiki/Web_Content_Accessibility_Guidelines
    - listitem:
      - link "Semantic":
        - /url: /wiki/Semantic_HTML
      - text: Web markup
    - listitem: (X)HTML Validation from the W3C for the page's content
    - listitem: CSS Validation from the W3C for the page's layout
    - listitem: Compliance with all guidelines from Section 508 of the US Rehabilitation Act
    - listitem: A high contrast version of the site for individuals with low vision, and a low contrast (yellow or blue) version of the site for individuals with dyslexia
    - listitem: Alternative media for any multimedia used on the site (video, flash, audio, etc.)
    - listitem: Simple and consistent navigation
    - listitem: Device independent
    - listitem: Reducing Cognitive load for decision making
  - paragraph:
    - text: While WCAG provides much technical information for use by web designers, coders and editors, BS 8878:2010 Web accessibility – Code of Practice
    - superscript:
      - link "[87]":
        - /url: "#cite_note-87"
    - text: has been introduced, initially in the UK, to help site owners and product managers to understand the importance of accessibility. It includes advice on the business case behind accessibility, and how organisations might usefully update their policies and production processes to embed accessibility in their business-as-usual. On 28 May 2019, BS 8878 was superseded by ISO 30071-1,
    - superscript:
      - link "[88]":
        - /url: "#cite_note-88"
    - text: the international Standard that built on BS 8878 and expanded it for international use.
  - paragraph:
    - text: Another useful idea is for websites to include a web accessibility statement on the site. Initially introduced in PAS 78,
    - superscript:
      - link "[89]":
        - /url: "#cite_note-89"
    - text: the best practice for web accessibility statements has been updated in BS 8878
    - superscript:
      - link "[90]":
        - /url: "#cite_note-90"
    - text: "to emphasise the inclusion of: information on how disabled and elderly people could get a better experience of using the website by using assistive technologies or accessibility settings of browsers and operating systems (linking to \"BBC My Web My Way\""
    - superscript:
      - link "[91]":
        - /url: "#cite_note-91"
    - text: can be useful here); information on what accessibility features the site's creators have included, and if there are any user needs which the site does not currently support (for example, descriptive video to allow blind people to access the information in videos more easily); and contact details for disabled people to be able to use to let the site creators know if they have any problems in using the site. While validations against WCAG, and other accessibility badges can also be included, they should be put lower down the statement, as most disabled people still do not understand these technical terms.
    - superscript:
      - link "[92]":
        - /url: "#cite_note-92"
  - heading "Education and accessibility for students" [level=2]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=24
  - text: "]"
  - figure "A teacher helps her student in an orphanage in central Vietnam. The orphanage caters to many abandoned and disabled children who, through education and communication programs, are able to have a life that would otherwise not be possible.":
    - link "A woman is helping a young boy to stand up in a classroom with other students":
      - /url: /wiki/File:Vietnam_phusical_therapy_school_orphanage.jpg
      - img "A woman is helping a young boy to stand up in a classroom with other students"
    - text: A teacher helps her student in an orphanage in central
    - link "Vietnam":
      - /url: /wiki/Vietnam
    - text: . The orphanage caters to many abandoned and disabled children who, through education and communication programs, are able to have a life that would otherwise not be possible.
  - figure "Construction of a ramp for a school latrine in Ukunda, Kenya, to make the school building more accessible to students with disabilities":
    - link "People constructing a ramp for an accessible bathroom":
      - /url: /wiki/File:Latrine_ramp_school.jpg
      - img "People constructing a ramp for an accessible bathroom"
    - text: Construction of a ramp for a school latrine in
    - link "Ukunda":
      - /url: /wiki/Ukunda
    - text: ", Kenya, to make the school building more accessible to students with disabilities"
  - paragraph:
    - text: Equal access to education for students with disabilities is supported in some countries by legislation. It is still challenging for some students with disabilities to fully participate in mainstream education settings, but many adaptive technologies and assistive programs are making improvements. In India, the
    - link "Medical Council of India":
      - /url: /wiki/Medical_Council_of_India
    - text: has now passed the directives to all the medical institutions to make them accessible to persons with disabilities. This happened due to a petition by Satendra Singh founder of
    - link "Infinite Ability":
      - /url: /wiki/Infinite_Ability
    - text: .
    - superscript:
      - link "[93]":
        - /url: "#cite_note-93"
  - paragraph: Students with a physical or mental impairment or learning disability may require note-taking assistance, which may be provided by a business offering such services, as with tutoring services. Talking books in the form of talking textbooks are available in Canadian secondary and post-secondary schools. Also, students may require adaptive technology to access computers and the Internet. These may be tax-exempt expenses in some jurisdictions with a medical prescription.
  - heading "Accessibility of assessments" [level=3]
  - text: "["
  - link "edit":
    - /url: /w/index.php?title=Accessibility&action=edit&section=25
  - text: "]"
  - paragraph:
    - text: It is important to ensure that the accessibility in education includes assessments.
    - superscript:
      - link "[94]":
        - /url: "#cite_note-94"
    - text: Accessibility in testing or assessments entails the extent to which a test and its constituent item set eliminates barriers and permits the test-taker to demonstrate their knowledge of the tested content.
    - superscript:
      - link "[95]":
        - /url: "#cite_note-95"
  - paragraph:
    - text: With the passage of the
    - link "No Child Left Behind Act":
      - /url: /wiki/No_Child_Left_Behind_Act
    - text: of 2001 in the United States,
    - superscript:
      - link "[96]":
        - /url: "#cite_note-96"
    - text: student accountability in essential content areas such as reading, mathematics, and science has become a major area of focus in educational reform.
    - superscript:
      - link "[97]":
        - /url: "#cite_note-97"
    - text: As a result, test developers have needed to create tests to ensure all students, including those with special needs (e.g., students identified with disabilities), are given the opportunity to demonstrate the extent to which they have mastered the content measured on state assessments. Currently, states are permitted to develop two different types of tests in addition to the standard grade-level assessments to target students with special needs. First, the alternate assessment may be used to report proficiency for up to 1% of students in a state. Second, new regulations permit the use of alternate assessments based on modified academic achievement standards to report proficiency for up to 2% of students in a state.
  - paragraph:
    - text: To ensure that these new tests generate results that allow valid inferences to be made about student performance, they must be accessible to as many people as possible. The Test Accessibility and Modification Inventory (TAMI)
    - superscript:
      - link "[98]":
        - /url: "#cite_note-98"
    - text: and its companion evaluation tool, the Accessibility Rating Matrix (ARM), were designed to facilitate the evaluation of tests and test items with a focus on enhancing their accessibility. Both instruments incorporate the principles of accessibility theory and were guided by research on universal design, assessment accessibility, cognitive load theory, and research on item writing and test development. The TAMI is a non-commercial instrument that has been made available to all state assessment directors and testing companies. Assessment researchers have used the ARM to conduct accessibility reviews of state assessment items for several state departments of education.
