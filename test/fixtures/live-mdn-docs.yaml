  - region "Parameters":
    - heading "Parameters" [level=3]:
      - link "Parameters":
        - /url: "#parameters"
    - term:
      - link "callbackFn":
        - /url: "#callbackfn"
        - code: callbackFn
    - definition:
      - paragraph: "A function to execute for each element in the array. Its return value is added as a single element in the new array. The function is called with the following arguments:"
      - term:
        - link "element":
          - /url: "#element"
          - code: element
      - definition:
        - paragraph: The current element being processed in the array.
      - term:
        - link "index":
          - /url: "#index"
          - code: index
      - definition:
        - paragraph: The index of the current element being processed in the array.
      - term:
        - link "array":
          - /url: "#array"
          - code: array
      - definition:
        - paragraph:
          - text: The array
          - code: map()
          - text: was called upon.
    - term:
      - link "thisArg Optional":
        - /url: "#thisarg"
        - code: thisArg
        - text: Optional
    - definition:
      - paragraph:
        - text: A value to use as
        - code: this
        - text: when executing
        - code: callbackFn
        - text: . See
        - link "iterative methods":
          - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array#iterative_methods
        - text: .
  - region "Return value":
    - heading "Return value" [level=3]:
      - link "Return value":
        - /url: "#return_value"
    - paragraph: A new array with each element being the result of the callback function.
  - region "Description":
    - heading "Description" [level=2]:
      - link "Description":
        - /url: "#description"
    - paragraph:
      - text: The
      - code: map()
      - text: method is an
      - link "iterative method":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array#iterative_methods
      - text: . It calls a provided
      - code: callbackFn
      - text: function once for each element in an array and constructs a new array from the results. Read the
      - link "iterative methods":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array#iterative_methods
      - text: section for more information about how these methods work in general.
    - paragraph:
      - code: callbackFn
      - text: is invoked only for array indexes which have assigned values. It is not invoked for empty slots in
      - link "sparse arrays":
        - /url: /en-US/docs/Web/JavaScript/Guide/Indexed_collections#sparse_arrays
      - text: .
    - paragraph:
      - text: The
      - code: map()
      - text: method is
      - link "generic":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array#generic_array_methods
      - text: . It only expects the
      - code: this
      - text: value to have a
      - code: length
      - text: property and integer-keyed properties.
    - paragraph:
      - text: Since
      - code: map
      - text: builds a new array, calling it without using the returned array is an anti-pattern; use
      - link "forEach":
        - /url: /en-US/docs/Web/JavaScript/Reference/Global_Objects/Array/forEach
        - code: forEach
      - text: or
      - link "for...of":
        - /url: /en-US/docs/Web/JavaScript/Reference/Statements/for...of
        - code: for...of
      - text: instead.
  - region "Examples":
